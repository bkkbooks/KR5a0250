body:
  text: 中和集叙光一維揚損菴蔡君志頤瑩蟾子李清菴之門人也勘破凡塵篤修仙道得清菴之殘膏賸馥編次成書題曰中和集蓋取師之靜室名也大德丙午秋謁余印可欲壽諸梓開悟後人余未啓帙先已知群妄掃空一眞呈露謂如天付之而爲命人受之而爲性至于先天太極自然金丹光照太虚不假修鍊者漏泄無餘矣可以窮神知變而深根寧極可以脱胎神化而復歸無極也抑以見道之有物混成儒之中和育物釋之指心見性此皆同工異曲咸自太極中來是故老聖常善救人佛不輕於汝等周公豈欺我哉覽是集者切忌生疑當塗南谷杜道堅書于錢塘玄元眞館
