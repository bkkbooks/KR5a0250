body:
  text: 都梁清菴瑩蟾子李道純元素撰門弟子損菴寳蟾子蔡志頤編問答語錄潔菴瓊蟾子程安道問三教一貫之道瑩幨子宴坐幨窟是夜寒光清氣眞潔可掏門人瓊幨子猛思生死事大神仙不可不敬慕功行不可不專修稽首拜問曰弟子嘗聞自古上聖高眞歷代仙師皆因修眞而成道必以鉛汞爲金丹之根蒂不知鉛汞是何物師曰夫鉛汞者天地之始萬物之母金丹之本也非凡鉛黑錫水銀宋砂奈何謬者不知眞玄私意揣度惑瓌後學徒費歲時擔閣一生深可憐憫若不遇眞師點化皆妄爲矣紫陽眞人曰饒君聰慧過顔閔不遇眞師莫强猜正謂此也我今爲汝指出眞鉛眞汞身心是也聖師云身心兩箇宇是藥也是火也又云要知産藥川源處只在西南是本鄉西南者坤也坤屬身身中之精乃陰中之陽也如乾中一爻入坤而成坎外陰内陽外柔内剛外坤内乾坎水之中有乾金故强名曰水中金也夫汞者心中之氣也陽中之陰也如坤中一爻入乾而成離外陽内陰外剛内柔外乾内坤離火之中有坤土故强名曰砂中汞也精氣感合之妙故强名立象以鉛汞喻之使學者知有體用耳以此推之無出身心兩宇身心合一之後鉛汞皆無也問如何是抽添曰身不動氣定謂之抽心不動神定謂之添身心不動神凝氣結謂之還元所以取坎中之陽補離中之陰而成乾謂抽鉛添汞也問如何是烹鍊曰身心欲合未合之際若有一毫相撓便以剛决之心敵之爲武鍊也身心既合精氣既交之後以柔和之心守之爲文烹也此理無他只是降伏身心便是烹鉛鍊汞也忘情養性虚心養神萬縁頓息百慮俱澄身心不動神凝氣結是謂丹基喻曰聖胎也以上異名只是以性攝情而已性寂情冥照見本來抱本還虚歸根復命謂之丹成也喻曰脱胎問諸丹經云用工之妙要在玄關不知玄關正在何處曰玄關者至玄至妙之機關也寧有定位着在身上即不是離了此身向外尋求亦不是泥於身則着於形泥於外則着於物夫玄關者只於四大五行不着處是也余今設一譬喻令汝易於曉會且如傀儡手足舉動百般舞蹈在乎線上關捩實由主人使之傀儡比得人之四大一身線比得玄關抽牽底主人比得本來眞性傀儡無線則不能動人無玄關亦不能運動汝但於二六時中行住坐卧着工夫向内求之語默視聽是箇甚麽若身心靜定方寸湛然眞機妙應處自然見之也易繫云寂然不動即玄關之體也感而遂通即玄關之用也自見得玄關一得求得藥物火候三元八卦皆在其中矣時人若以有形着落處爲玄關者縱勤功苦志事終不成欲直指出來恐汝信不及亦不得用須是自見始得譬如儒家先天之學亦要默而識之孟子云浩然之氣塞乎天地之間曰難言也且難言之妙非玄關乎且如釋氏不立文宇教外别傳使人神領意會謂之不傳之妙能知此理者則能一徹萬融也問或謂崇釋與修道可以斷生死出輪迴學儒可盡人倫不能了生死豈非三教異同乎曰達理者奠患生死耶且如窮理盡性以至於命原始返終知周萬物則知生死之說所以性命之學實儒家正傳窮得理徹了然自知豈可不能斷生死輪迴乎且如羲皇初畫易之時體天設教以道化人未嘗有三教之分故曰皇天無二道聖人無兩心當來初畫一者象太極也有一便有二象兩儀也一者陽也一者陰也一陰一陽之謂道仰則觀於天上畫一畫以象天俯則察於地下畫一畫以象地中畫一畫以象人故三畫以成乾三象三才也兩乾斷而成坤象六合也故曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故六畫而成坤以一身言之立天之道曰陰與陽心之神氣也立地之道曰柔與剛身之形體也立人之道曰仁與義意之情性也心身意象乾三才也神氣性情形體象坤之六合也易曰遠取諸物近取諸身此之謂也問繫辭云六畫而成卦先生云六畫而成坤者何也曰汝未知之若謂六畫而成卦者文王重卦也文王未重卦之前豈可謂無三才六合乎先賢云立天之道曰陰與陽天之乾坤也立地之道曰柔與剛地之乾坤也立人之道曰仁與義人之乾坤也以此推之乾坤兩卦三才六合備矣又豈以重卦言之哉所謂六畫而成卦者重卦之後名爲後天卦也問若謂未重卦之前三才六合備矣而繫辭云以制器者尚其象未必因器而設象因象而制器乎曰因象而制器問三皇以下聖人制器皆以重卦言之若謂因象制器文王未重易之前豈有重卦之名乎曰非也前賢云須信畫前元有易所以文王未重卦之前六十四卦俱備問卦若不重六十四卦從何而得曰變卦所生也一卦變八卦八卦變六十四卦且如乾卦三爻上兩爻少陽下一爻老陽支出巽卦來陽變爲陰乾之巽天風媚也舉此一卦諸卦皆然問卦不重而有六十四卦文王如何又重之曰卦不重而變六十四卦乃羲皇心法道統正傳誘萬世之下學者同入聖門重卦而生六十四卦者乃文王周孔立民極正人倫使世人趨吉避凶立萬世君臣父子之綱耳故性命之學不敢輕明於言亦不忍隱斯道孔子微露於係辭濓溪發明於太極通書也蓋欲來者熟咀之而自得之此學不泯其傳矣問一陰一陽之謂道如何說曰陰陽者乾坤也乾坤出於太極太極判而兩儀立焉兩儀天地也不言天地而言乾坤者貴其用不貴其體也或曰乾陽也坤陰也如何又云天地曰天地即乾坤也乾坤即陰陽也陰陽一太極也太極本無極也以太極言之則曰天地以易言之則曰乾坤以道言之則曰陰陽若以人身言之天地形體也乾坤性情也陰陽神氣也以法象言之天龍地虎也乾馬坤牛也陽烏陰兔也以金丹言之天鼎地爐也乾金坤土也陰汞陽鉛也散而言之種種異名合而言之一陰一陽也修仙之人鍊鉛汞而成丹者即身心合而還其本初陰陽合而復歸太極也問三五一是何也曰三元五行也東三南二是一箇五北一西四是兩箇五中土是三箇五是謂三五也以人身言之性三神二是一箇五情四精一是兩箇五意五是三箇五也三五合一則歸太極身心意合一則成聖胎也紫陽眞人云三五一都三箇字三元五行一氣是也古今明者實然稀世鮮知之東三南二同成五東三性也南二神也北一西四方共之北一精也西四情也戊己還從生數五土數五意也三家相見結嬰兒三家者身心意也嬰兒者三五合一而成用也嬰兒是一含眞氣嬰兒是眞一之異名太一含眞也十月胎圓入聖基工夫十月脱出凡胎超凡入聖也以此求之金丹之道實入聖基也問係辭云天地設位易行乎中如何曰天地設位人生於中是謂三才故人與物生生而不息所以不言人與物而言易者聖人言乾坤易之門隨時變易以從道也如金丹以乾坤爲鼎器者天地設位也以陰陽爲化機者即易行乎中也元始採藥無窮行火候之不息也問闢户謂之乾闔户謂之坤一闔一闢謂之變如何曰一闔一闢者一動一靜也乾陽坤陰如門户之闔闢即乾坤易之門也且如陰陽互動互靜機緘不已元亨利貞定四時成歲變者變易也至道與神氣混混淪淪周乎三才萬物闔闢無窮致廣大而盡精微矣以一身言之呼吸是矣呼則接天根是謂之闢吸則接地根是謂之闔一呼一吸化生金液是謂之變闔闢呼吸即玄牝之門天地之根矣所謂呼吸者非口鼻呼吸乃眞息闔闢也問乾道成男坤道成女如何曰乾父也坤母也乾初爻交坤而成震震初索而得男是謂長男坤初爻交乾而成巽巽初索而得女是謂長女乾中爻交坤而成坎坎再索而得男是謂中男坤中爻交乾而成離離再索而得女是謂中女乾三爻交坤而成艮艮三索而得男是謂少男坤三爻交乾而成兊兊三索而得女是謂少女乾生三男坤生三女乾坤共生六子是謂八卦以身言之初受胎時禀父母精華而成此身精華者丹經喻曰天壬地癸也初交合時天壬先至地癸隨至癸裹壬則成男子地癸先至天壬隨至壬裹癸則成女子壬癸偶然齊至則成雙胎壬先至癸遲至癸先至壬遲至俱不成胎也故曰乾道成男坤道成女夫天壬地癸者乃天地元精元氣也亦丹經所云坎戊離己異名鉛汞也節之於外則成人益之於内則成丹肚人不知生男生女實由命分中得不由人力若不斷淫絶慾自爲修養苴待精華耗謁早至夭亡大可借也又豈知寡慾而得男女貴而壽多慾而得男女濁而夭問形而上者謂之道形而下者謂之器如何曰形而上者無形質形而下者有體用無形質者係乎性汞也有體用者係乎命鉛也總而言之無出身心也問聖人以易洗心退藏於密密是何也曰誠之至也易理致廣大而盡精微聖人玩味其理洗心滌慮藏於極誠矣問書云人心惟危道心惟微惟精惟一允執厥中不知中如何執曰執者一定之辭中者正之中也道心微而難見人心危而不安雖至人亦有人心雖下愚亦有道心苟能心常正得中所以微妙而難見也若心稍偏而不中所以危殆而不安也學仙之人擇一而守之不易常執其中自然危者安而微者著矣金丹用中爲玄關者亦是這箇道理問上天之載無聲無臭如何曰誠之昭著雖無聲可聞無臭可知天道亦不可掩如道經云大量玄玄亦是眞之至也問不識不知順帝之則如何曰聖人生而知之默而順之天埋所謂不思而得不勉而中得無爲自然之道也此則中庸所謂誠而明也若謂明而誠正是聖人之教耳學道之人夙有根器一直了性自然了命也此生而知之也根器淺薄者不能一苴了性自教而入從有至無自粗達妙所以先了命而後了性也此學而知之也問夫子飯蔬食飮水曲肱而枕之樂亦在其中矣夫子樂在何處曰夫子所樂者天所知者命故樂天知命而不憂雖匡人所逼猶且弦歌自娱於易得不遠復以修身復見天地之心窮理盡性以至於命此金丹之妙也問顔子簞瓢之樂如何曰顔子得夫子樂天知命不憂之理故不改其樂也所以如愚心齋坐忘黜聰明去智慮庶乎屢空亦金丹之妙也問曾子被破褐而頌聲滿天地天子不得而臣諸侯不得而友是如何曰曾子一唯之妙口耳俱忘所以修身齊家治國平天下得一貫之道問子路問死夫子答曰未知生焉知死是如何曰生死乃晝夜之常知有晝則知有夜易云原始返終則知死生之說丹書云父母未生已前是金丹之基釋云未有此身性在何處以此求之三教入處只要原其始自知其絡泝其流而知其源人能窮究此身其所從來生死自然都知也汝曾看太極圖否太極未判之前是甚麽若窮得透則知此身之前原始可以要終也問太極未判其形若鷄子鷄子之外是甚麽曰太虚也凡人受氣之時形體未分亦如鷄子既生之後立性立命一身之外皆太虚也問人在母腹中時還有性否曰腹中穢污靈性豈存得住又問懷胎五七箇月其胎忽動莫非性乎曰非性也一氣而已人在腹中時隨母呼吸一離母胎立性立命便自有天地且如蛇斬作兩段前尚走尾尚活又有人煮蟹既熟遺下生脚尚動豈性也汝究此理則知氣動也非性也問語云吾道一以貫之如何曰聖人言身中一天埋可以貫通三才三教萬事無不備矣如釋氏無我無人無衆生無壽者道教了一萬事畢皆一貫也問肚尊拈花示衆獨迦葉微笑肚尊云吾有正法眼藏涅槃妙心分付摩訶迦葉不知微笑者何事曰肚尊拈花示衆衆皆不見佛心獨迦葉見佛心之妙所以微笑故肚尊以心外之妙分付與迦葉也問達摩西來不立文宇苴指人心見性成佛如何是見性曰達磨以眞空妙理眞指人心見性者使人轉物情空自然見性也豈在乎筆舌傳之哉問儒有先天易釋有般若經道有靈寳經莫非文宇乎曰非也皆聖人以無言而形於有言顯眞常之道也釋教一大藏教典及諸家語録因果儒教九經三傳諸子百家道教洞玄諸品經典及諸丹書是入道之徑路超昇的梯階若至極處一箇宇也使不着汝問余數事亦只是過河之筏向上一着當於言句之外求之或築着磕着悟得透得復歸於太極圓明覺照虚徹靈通性命雙全形神俱妙虚空同體仙佛齊肩亦不爲難問先生云三教一理極荷開發但釋氏涅槃道家脱胎似有不同處曰涅槃與脱胎只是一箇道理脱胎者脱去凡胎也豈非涅槃乎如道家鍊精化氣鍊氣化神鍊神還虚即抱本歸虚與釋氏歸空一理無差别也又問脱胎後還有造化麽曰有造化在聖人云身外有身未爲奇特虚空粉碎方露全眞所以脱胎之後正要脚踏實地直待與虚空同體方爲了當且如佛云眞空儒曰無爲道曰自然皆抱本還元與太虚同體也執着之徒疇克知此一貫之道哉潔菴曰先生精造金丹之妙道融通三教之玄機隨問隨答極玄極妙豈敢自祕當刊諸梓與同志之士相與開發隋珠趙璧自有識者趙定菴問答師曰前代祖師高眞上聖有無上至眞之道留傳在世度人汝還知否定菴曰弟子初進玄門至愚至蠢蒙師收録千載之幸也無上正眞之道誠未知之望師開發師曰無上正眞之道者無上可上玄之又玄無象可象不然而然至極至妙之謂也聖人强名曰道自古上仙皆由此處了達未有不由是而修證者聖師口口歷代心心相傳所授金丹之㫖乃無上正眞之妙道也定菴曰無上正眞之妙喻爲金丹其埋云何師曰金者堅也丹者圓也釋氏喻之爲圓覺儒家喻之爲太極初非别物只是本來一靈而已本來眞性永劫不壞如金之堅如丹之圓愈鍊愈明釋氏曰此者眞如也儒曰此者太極也吾道曰此乃金丹也體同名異易曰易有太極是生兩儀太極者虚無自然之謂也兩儀者一陰一陽也陰陽天地也人生於天地之間是謂三才三才之道一身備矣太極者元神也兩儀者身心也以丹言之太極者丹之母也兩儀者眞鉛眞汞也所謂鉛汞者非水銀朱砂硫黃黑錫草木之類亦非精津涕唾心腎氣血乃身中元神身中元氣身不動精氣凝結喻之曰丹所謂丹者身也者眞性也丹中取出者謂之丹成所謂丹者非假外而造作由所生之本而成正眞也世鮮知之今之修丹之士多不得其正傳皆是向外尋求隨邪背正所以學者多而成者少也或鍊五金八石或鍊三遜五假或鍊雲霞外氣或鍊日月精華或採星曜之光或想空中丸塊而成丹或想丹田有物而爲丹或肘後飛金精或眉間存想或還精補腦或運氣歸臍乃至服穢吞精納新吐故八段錦六字氣揺夾脊絞轆轤閉尾閭守臍蒂採天癸鍛秋石屈伸導引撫摩消息默朝上帝舌拄上腭三田還返閉息行氣三火聚於膀胱五行攢於苦海如斯小法何啻千門縱勤功採取絡不能成其大事經云正法難遇多迷眞道多入邪宗此之謂也夫至眞之要至簡至易難遇易成若遇至人點化無不成就定菴曰弟子夙生慶幸得遇老師幸沾法乳金丹之要望賜點化師曰汝今諦聽當爲汝談夫鍊金丹者全在奪天地造化以乾坤爲鼎器日月爲水火陰陽爲化機烏兔爲藥物仗天罡之斡運斗柄之推遷採藥有時運符有則進火退符體一年之節候抽鉛添汞象一月之虧盈攢簇五行合和四象追二氣歸黄道會三性於元宫返本還元歸根復命功圓神備凡蛻爲仙謂之丹成也定菴曰天地造化誠恐難奪師曰無出一身奚難之有天地形體也水火精氣也陰陽身心也烏兔性情也所以形體爲鼎爐精氣爲水火情性爲化機身心爲藥材聖人恐學者無以取則遂以天地喻之人身與天地造化無有不同處身心兩箇宇是藥也是火所以天魂地魄乾馬坤牛陽鉛陰汞坎男離女日烏月兔無出身心兩字也天罡斡運者天心也丹書云人心若與天心合顚倒陰陽止片時又云以心觀道道即心也以道觀心心即道也斗柄推遷者玄關也夫玄關者至玄至妙之機關也今之學者多泥於形體或云眉間或云臍輪或云兩腎中間或云臍後腎前或云膀胱或云丹田或云首有九宫中爲玄關或指産門爲生身處或指口鼻爲玄牝皆非也但着在形體上都不是亦不可離此一身向外尋求諸丹經皆不言正在何處者何也難形筆舌亦說不得故曰玄關所以聖人只書一中字示人此中宇玄關明矣所謂中者非中外之中亦非四維上下之中不是在中之中釋云不思善不思惡正恁麽時那箇是自己本來面目此禪家之中也儒曰喜怒哀樂未發謂之中此儒家之中也道曰念頭不起處謂之中此道家之中也此乃三教所用之中也易曰寂然不動中之體也感而遂通中之用也老子云致虚極守靜篤萬物並作吾以觀其復易云復其見天地之心且復卦一陽生於五陰之下陰者靜也陽者動也靜極生動只道動處便是玄關也汝但於二六時中舉心動念處着工夫玄關自然見也見得玄關藥物火候運用抽添乃至脱胎神化並不出此一竅採藥者採身中眞鉛眞汞也藥生有時非冬至非月生非子時祖師云鍊丹不用尋冬至身中自有一陽生又云鉛見癸生須急採金逢望遠不堪嘗以此求之身中癸生一陽時也便可下手採之二氣交合之後要識持盈不可太過望遠不堪嘗也進火退符無以取則遂以一年節候寒暑往來以爲火符之則又以一月盈虧以明抽添之㫖且如冬至一陽生復卦十二月二陽臨卦正月三陽泰卦二月四陽大壯卦三月五陽夬卦四月純陽乾卦陽極陰生五月一陰媚卦六月二陰遯卦七月三陰否卦八月四陰觀卦九月五陰剥卦十月純陰坤卦陰極陽生周而復始此火符進退之機奈何學者執文泥象以冬至日下手進火夏至退符二八月沐浴尤不知其要也聖人見學者錯用心志又以一年節候促在一月之内以朔望象冬夏至以兩弦比二八月以兩日半准一月以三十日准一年世人又着在月上又以一月盈虧促在一日以子午體朔望以卯酉體二弦學者又着在日上近代眞師云一刻之工夫自有一年之節候又曰父母未生以前烏有年月日恃此聖人誘喻初學勿錯用心奈何執着之徒不窮其理執文泥象徒爾勞心余今直指與汝身中癸生便是一陽也陽升陰降便是三陽也陰陽分是四陽體二月如上弦比卯恃宜沐浴然後進火陰陽交神氣合六陽也陰陽相交神氣混融之後要識持盈不知止足前功俱廢故曰金逢望遠不堪嘗然後退符象一陰乃至陰陽分象三陰陰陽伏位宜沐浴象八月比下弦如酉恃也然後退至六陰陰極陽生頃刻之間一周天也汝但依而行之久久工夫漸凝漸結無質生質結成聖胎謂之丹成也定菴曰下手工夫周天運用已蒙開發種種異名不能盡知望師指示師曰異名者只是譬喻無出身心兩字下工之際凝耳韻含眼光緘舌氣調鼻息四大不動使精神魂魄意各安其位謂之五氣朝元運入中宫謂之攢簇五行心不動龍吟身不動虎嘯身心不動謂之降龍伏虎龍吟則氣固虎嘯則精固握固靈根也以精氣喻之龜蛇以身心喻之龍虎龜蛇打成一片謂之合和四象以性攝情謂之金木併以精御氣謂之水火交木與火同源兩性一家東三南二同成五也水與金同源兩性一家北一西方四共之也土居中宫屬意自己五數戊己還從生數五心身意打成一片三家相見結嬰兒總謂之三五混融也鍊精化氣鍊氣化神鍊神還虚謂之三花聚鼎又謂之三關今之學人多指尾閭夾脊玉枕爲三關者只是功法非至要也舉心動念處爲玄牝今人指口鼻者非也身心意爲三要心中之性謂之砂中汞身中之氣謂之水中金金本生水乃水之母金反居水中故曰母隱子胎外境勿令入内境勿令出謂之固濟寂然不動謂之養火虚無自然謂之運用存誠篤志謂之守城降伏内魔謂之野戰眞汞謂之垞女蓂鉛謂之嬰兒胎意謂之黃婆性情謂之夫婦澄心定意性寂神靈二物成團三元輻輳謂之成胎愛護靈根謂之温養所謂温養者如龍養珠如鷄覆子謹謹護持勿令差失毫髪有差前功俱廢也陽神出殻謂之脱胎歸根復命還其本初謂之超脱打破虚空謂之了當也定菴曰金丹成恃還可見否答曰可見曰有形否曰無形問曰既無形如何可見答曰金丹只是强名豈有形乎所謂可見者不可以眼見釋曰於不見中親見親見中不見道經云視之不見聽之不聞斯謂之道視之不見未嘗不見聽之不聞未嘗不聞所謂可見可聞非耳目所及也心見意聞而已譬如大風起入山撼木入水揚波豈得謂之無觀之不見搏之不得豈得謂之有金丹之體亦復如是所以鍊丹之初有無互用動靜相須乃至成功諸縁頓息萬法皆空動靜俱忘有無俱遣始得玄珠成象太一歸眞也性命雙全形神俱妙出有入無逍遥雲際果證金仙也所以經典丹書種種異名接引學人從粗達妙漸入佳境及至見性悟空其事却不在紙上譬若過河之舟濟度斯民既登彼岸舟船無用矣前賢云得兔忘蹄得魚忘筌此之謂也且余今語此授汝却不可執在言上但只細嚼熟玩其未窮究本源荀或一言之下心地開通直入無爲之境是不難也更有向上機關未易輕述當於言外求之金丹或問予觀丹經子書後人箋注取用不一或着形體或泥文墨或以清凈爲苦空或以汞鉛爲有象所見不同後人豈得不惑殊不知至道則一豈有二哉又近來丹書所集多是傍門如解七返九還寅子數坤申之類不亦謬乎予今將丹書中精要集成或問三十六則以破後人之惑達者味之或問何謂九還曰九乃金之成數還者還元之義則是以性攝清而已情屬金情來歸性故日九還丹書云金來歸性初乃得稱還丹此之謂也若以子數至申爲九還者非也或問何謂七返曰七乃火之成數返者返本之義則是鍊神還虚而已神屬火鍊神返虚故曰七返或以寅至申爲七返非也悟眞篇云休將寅子數坤申只要五行繩準正謂此也或問何謂三關曰三元之機關也鍊精化氣爲初關鍊氣化神爲中關鍊神還虚爲上關或指尾閭夾脊玉枕爲三關者只是工法非至要也登眞之要在乎三關豈有定位存乎口訣或問何謂玄關曰至玄至妙之機關也初無定位今人多指臍輪或指頂門或指印堂或指兩腎中間或指腎前臍後已上皆是傍門丹書云玄關一竅不在四維上下不在内外偏傍亦不在當中四大五行不着處是也或問何謂三宫曰三元所居之宫也神居乾宫氣居中宫精居坤宫今人指三田者非也或問何謂三要曰歸根之竅復命之關虚無之谷是謂三要或指口鼻爲三要者非也或問何謂玄北曰谷神不死是謂玄北或指口鼻者非也紫陽眞人云念頭起處爲玄北斯言是也予謂念頭起處乃生死之根豈非玄北乎雖然亦是工法最上一乗在乎口訣或問何謂眞種子曰天地未判之先一點靈明是也或謂人從一氣而生以氣爲眞種子或謂因念而有此身以念爲眞種子或謂禀二五之精而有此身以精爲眞種子此三說似是而非釋云無量劫來生死本癡人唤作本來眞此之謂也或問何謂鼎爐曰身心爲鼎爐丹書云先把乾坤爲鼎器次搏烏兔藥來烹乾心也坤身也今人外面安爐立鼎者謬矣或問何謂藥物曰眞鉛眞汞爲藥物只是本來二物是也或問何謂内藥何謂外藥曰鍊精鍊氣鍊神其體則一其用有二交感之精呼吸之氣思慮之神皆外藥也先天至精虚無空氣不壞元神此内藥也丹書云内外兩般作用正謂此也或問敲竹唤龜吞玉芝如何說曰敲竹者息氣也唤龜者攝精也鍊精化氣以氣攝精精氣混融結成玉芝採而吞之保命也或問鼓琴招鳳飲刀圭如何說曰鼓琴者虚心也招鳳者養神也虚心養神心明神化二土成圭採而飲之性圓明也或問如何是五氣朝元曰身不動精固水朝元心不動氣固火朝元性寂則魂藏木朝元情忘則魄伏金朝元四大安和則意定土朝元此之謂五氣朝元也或問何謂黃婆曰黃者中之色婆者母之稱萬物生於土土乃萬物之母故曰黃婆人之胎意是也或謂脾神爲黃婆者非也或問何謂金公曰以理言之乾中之陽入坤成坎坎爲水金乃水之父故曰金公以法象言之金邊着公字鈆也或問坎爲太陰如何喻嬰兒曰坎本坤之體故曰太陰因受乾陽而成坎爲少陽故喻之爲嬰兒謂負陰抱陽也或問離爲太陽却如何喻爲垞女曰離本乾之體故曰太陽因受坤陰而成離爲少陰故喻之爲姹女謂雄裏懷雌也或問何謂眞金曰金乃元神也歷劫不壞愈鍊愈明故曰眞金或問如何是子母曰水中金也金爲水之母金藏水中故母隱子胎也則是神乃身之母神藏於身喻爲母隱子胎或問何謂賓主曰性是一身之主以身爲客今借此身養此性故讓身爲主丹書云饒他爲主我爲賓此之謂也或問何謂先天一氣曰天地未判之先一靈而已身中一點眞陽是也以其先乎覆載故名先天或問何謂水火曰天以日月爲水火易以坎離爲水火禪以定慧爲水火聖人以明潤爲水火毉道以心腎爲水火丹道以精氣爲水火我今分明指出自己一身之中上而炎者皆爲火下而潤者皆爲水種種異名無非譬喻使學者自得之也或問如何是火中有水曰從來神水出高原以埋言之水不能自潤須仗火蒸而成潤以法象言之火旺在午水受氣在午以此求之火中有水明矣若以一身言之則是氣中之液也或問如何水中有火曰以理言之日從海出以法象言之水旺在子火受胎在子以一身言之則是精中之氣也或問如何是既濟曰水升火降曰既濟易曰山下有澤損君子以懲忿窒慾此既濟之方懲忿則火降窒慾則水升或問如何是未濟曰不能懲忿則火上炎不能窒慾則水下濕無明火熾苦海波翻水火不交謂之未濟或問如何是金木併曰情來歸性謂之交併情屬金性屬木或問如何是間隔曰情逐物性隨念情性相違謂之間隔或問如何是清濁曰心不動水歸源故清心動水隨流故濁或問何謂二八曰一斤之數也半斤鉛八兩汞非眞有斤兩只要二物平勾故曰二八丹書云前弦之後後弦前藥物平平火力全比喻陰陽平也亦如二八月晝夜停也或問如何是沐浴曰洗心滌慮謂之沐浴或問如何是丹成曰身心合一神氣混融情性成片謂之丹成喻爲聖胎仙師云水來眞性是金丹四假爲爐鍊作團是也或問何謂養火曰絶念爲養火或問如何是脱胎曰身外有身爲脱胎或問如何是了當曰與太虚同體謂之了當物外造化未易輕述在人自得之也全眞活法授諸門人全眞道人當行全眞之道所謂全眞者全其本眞也全精全氣全神方謂之全眞才有欠缺便不全也才有點污便不眞也全精可以保身欲全其精先要身安定安定則無欲故精全也全氣可以養心欲全其氣先要心清靜清靜則無念故氣全也全神可以返虚欲全其神先要意誠意誠則身心合而返虚也是故精氣神爲三元藥物身心意爲三元至要學神仙法不必多爲但鍊精氣神三寳爲丹頭三寳會於中宫金丹成矣豈不易知豈爲難行難行難知者爲邪妄眩惑爾鍊精之要在乎身身不動則虎嘯風生玄龜潜伏而元精凝矣鍊氣之要在乎心心不動則龍吟雲起朱雀歛翼而元氣息矣生神之要在乎意意不動則二物交三元混一而聖胎成矣乾坤鼎器坎離藥物八卦三元五行四象並不出身心意三宇全眞至極處無出身心兩宇離了身心便是外道雖然亦不可着在身心上才着在身心又被身心所累須要即此用離此用予所謂身心者非幻身肉心也乃不可見之身心也且道如何是不可見之身心雲從山上月向波心身者歷劫以來清靜身無中之妙有也心者象帝之先靈妙本有中之眞無也無中有象坎有中無象離祖師云取將坎位中心實點化離宫腹内陰自此變成乾健體濳藏飛躍盡由心予謂身心兩宇是全眞致極處復何疑哉鍊丹之要只是性命兩字離了性命便是旁門各執一邊謂之偏枯祖師云神是性兮氣是命即此義也鍊氣在保身鍊神在保心身不動則虎嘯心不動則龍吟虎嘯則鉛投汞龍吟則汞投鉛鉛汞者即坎離之異名也坎中之陽即身中之至精也離中之陰即心中之元氣也鍊精化氣所以先保其身鍊氣化神所以先保其心身定則形固形固則了命心定則神全神全則了性身心合性命全形神妙謂之丹成也精化氣氣化神未爲奇特夫何故猶有鍊神之妙未易輕言予前所言金丹之大槩若向這裏具隻眼方信大事不在紙上其或未然須知下手處既知下手處便從下手處做將去自鍊精始精住則然後鍊氣氣定則然後鍊神神凝則然後返虚虚之又虚道德乃俱鍊精在知時所謂恃者非時候之時也若着在恃上便不是若謂無時如何下手畢竟作麽生咦古人言時至神知祖師云鉛見癸生須急採斯言盡矣鍊氣在調燮所謂調燮者調和眞息燮理眞元也老子云玄牝之門是謂天地根綿綿若存用之不勤其調燮之要乎今人措口鼻爲玄牝之門非也玄牝者天地闔闢之機也易係云闔户之謂坤闢户之謂乾一闔一闢之謂變一闔一闢即一動一靜老子所謂用之不勤之義也丹書云呼則接天根吸則接地根呼則龍吟雲起吸則虎嘯風生予謂呼則接天根吸則接地根即闔户之謂坤闢户之謂乾也呼則龍吟雲起吸則虎嘯風生即一闔一闢之謂變亦用之不勤之義也措口鼻爲玄牝不亦謬乎此所謂呼吸者眞息往來無窮也口訣外陰陽往來則外藥也内坎離輻輳乃内藥也外有作用内則自然精氣神之用有二其體則一以外藥言之交合之精先要不漏呼吸之氣更要細細至於無息思慮之神貴在安靜以内藥言之鍊精鍊元精抽坎中之元陽也元精固則交合之精自不泄鍊氣鍊元氣補離中之元陰也元氣住則呼吸之氣自不出入鍊神鍊元神也坎離合體成乾也元神凝則思慮之神泰定其上更有鍊虚一着非易輕言貴在嘿會心通可也勉旃勉旃中和集卷之三
