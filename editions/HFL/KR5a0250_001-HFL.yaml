front:
  text: 中和集卷之一
  hash: sha256:0abde55f985a8f255b645458fd8fdf63294d2c5b5841dec7efc8b72326981393
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0250_HFL_001-001a, image: hfl/0118/0118-006.png}
body:
  text: 都梁清菴瑩蟾子李道純元素撰門弟子損菴寳蟾子蔡志頤編玄門宗㫖動靜無端太極圖陰陽無始釋曰圓覺道曰金丹儒曰太極所謂無極而太極者不可極而極之謂也釋氏云如如不動了了常知易繫云菽然不動感而遂通丹書云身心不動以後復有無極眞機言太極之妙本也是知三教所尚者靜定也周子所謂主於靜者是也蓋人心靜定未感物時湛然天埋即太極之妙也一感於物便有偏倚即太極之變也苟靜定之時謹其所存則天理常明虚靈不昧動時自有主宰一切事物之來俱可應也靜定工夫純熟不期然而自然至此無極之眞復矣太極之妙應明矣天地萬物之理悉備於我矣四正中直中和圖發無不中禮記云喜怒哀樂未發謂之中發而皆中節謂之和未發謂靜定中謹其所存也故曰中存而無體故謂天下之大本發而中節謂動時謹其所發也故曰和發無不中故謂天下之達道誠能致中和於一身則本然之體虚而靈靜而覺動而正故能應天下無窮之變也老君曰人能常清靜天地悉皆歸即子思所謂致中和天地位萬物育同一意中也和也感通之妙用也應變之樞機也周易生育流行一動一靜之全體也予以所居之舍中和二宇匾名不亦宜乎哉委順圖身心世事謂之四縁一切世人皆爲縈絆惟委順者能應之常應常靜何縁之有何謂委委身寂然委心洞然委世混然委事自然何謂順順天命順天道順天時順天理身順天命故能應人心順天道故能應物世順天時故能應變事順天理故能應機既能委又能順兼能應則四縁脱灑作是見者常應常靜常清靜矣照妄圖古云常滅動心不滅照心一切不動之心皆照心也一切不止之心皆妄心也照心即道心也妄心即人心也道心惟微謂微妙而難見也人心惟危謂危殆而不安也雖人心亦有道心雖道心亦有人心係乎動靜之間爾惟允執厥中者照心常存妄心不動危者安平微者昭著到此有妄之心復矣無妄之道成矣易曰復其見天地之心乎太極圖頌中者無極而太極也太極動而生陽動極而靜靜而生陰一陰一陽兩儀立焉者兩儀也者陽動也者陰靜也陰陽互交而生四象者四象動而又動曰老陽動極而靜曰少陰靜極復動曰少陽靜而又靜曰老陰四象動靜而生八卦乾一兊二老陽動靜也離三震四少陰動靜也艮五坎六少陽動靜也兊七坤八老陰動靜也陰逆陽順一升一降機緘不已而生六十四卦萬物之道至是備矣上者氣化之始也下者形化之母也知氣化而不知形化則不能極廣大知形化而不知氣化則不能盡精微故作頌而證之頌二十五章道本至虚至虚無體窮於無窮始於無始虚極化神神變生氣氣聚有形一分爲二二則有感感則有配陰陽互交乾坤定位動靜不已四象相係健順推盪八卦兹係運五行而有常定四時而成歲沖和化醇資始資生在天則斡旋萬象在地則長養群情形形相授物物相孕化化生生奠有窮盡天下萬物生於有有生於無有無錯綜隱顯相扶原其始也一切萬有未有不本乎氣推其終也一切萬物未有不變於形是知萬物本一形氣也形氣本一神也神本至虚道本至無易在其中矣天位乎上地位乎下人物居中自融自化氣在其中矣天地物之最巨人於物之最靈天人一也宇宙在乎手萬化生乎身變在其中矣人之極也中天地而立命禀虚靈以成性立性立命神在其中矣命係乎氣性係乎神潜神於心聚氣於身道在其中矣形化則有生有生則有死出生入死物之常也氣化則無生無生故無死不生不死神之常也形化體地氣化象天形化有感氣化自然明達高士全氣全神千和萬合自然成眞眞中之眞玄之又玄無質生質是謂胎仙欲造斯道將奚所自惟靜惟虚胎仙可冀虚則無礙靜則無欲虚極靜篤觀化知復動而主靜實以抱虚二理相須神與道俱道者神之主神者氣之主氣者形之主形者生之主無生則形住形住則氣住氣住則神住神住則無住是名無住住金液鍊形玉符保神形神俱妙與道合眞命寳凝矣性珠明矣元神靈矣胎仙成矣虚無自然之道畢矣大哉神也其變化之本歟畫前密意易象第一易可易非常易象可象非大象常易不易大象無象常易未畫以前易也變易既畫以後易也常易不易太極之體也可易變易造化之元也大象動靜之始也可象形名之母也歷劫寂爾者常易也亘古不息者變易也至虚無體者大象也隨事發見者可象也所謂常者莫窮其始莫測其終歷千萬世廓然而獨存者也所謂大者外包乾坤内充宇宙遍河沙界湛然圓滿者也常易不易故能統攝天下無窮之變大象無象故能形容天下無窮之事易也象也其道之原乎常變第二常易不變變易不常其常不變故能應變其變不常故能體常始終不變易之常也動靜不常易之變也獨立而不改得其常也周行而不殆通其變也不知常不足以通變不通變不足以知常常也變也其易之原乎體用第三常者易之體變者易之用古今不易易之體隨時變易易之用無思無爲易之體有感有應易之用知其用則能極其體全其體則能利其用聖人仰觀俯察遠求近取得其體也君子進德修業作事制器因其用也至於窮理盡性樂天知命修齊治平紀綱法度未有外乎易者也全其易體足以知常利其易用足以通變動靜第四剛柔推盪易之動靜陰陽升降氣之動靜奇偶交重卦之動靜氣形消息物之動靜晝夜興寢身之動靜至於身之進退心之起滅世之通塞事之成敗皆一動一靜互相倚伏也觀其動靜則萬事之變萬物之清可見矣靜時有存動則有察靜時有主動則可斷靜時有定動罔不吉靜者動之基動者靜之機動靜不失其常其道光明矣屈伸第五暑往寒來歲之屈伸日往月來氣之屈伸古往今來世之屈伸至於有無相生難易相成長短相形高下相傾皆屈伸之埋也知屈伸相感之道則能盡天下無窮之利也消息第六息者消之始消者息之絡息者氣之聚消者形之散生育長養謂之息歸根復命謂之消元而亨易之息也利而貞易之消也春而夏歲之息也秋而冬歲之消也嬰而壯身之息也老而終身之消也無而有物之息也有而無物之消也息者生之徒消者死之徒自二氣肇分以來未有消而不息之埋亦未有息而不消之物通而知之者燭埋至明者也神機第七存乎中者神也發而中者機也寂然不動神也感而遂通機也隱顯莫測神也應用無方機也藴之一身神也推之萬物機也吉凶先兆神也變動不居機也備四德自强不息者存乎神者也貫三才應用無盡者運其機者也智行第八智者深知其埋也行者力行其道也深知其埋不見而知力行其道不爲而成不出户知天下不窺牖見天道深知也自强不息無往不適力行也知亂於未亂知危於未危知亡於未亡知禍於未禍深知也存於身而不爲身累行於心而不爲心役行於世而不爲世移行於事而不爲事礙力行也深知其理者可以變亂爲治變危爲安變亡爲存變禍爲福力行其道者可以致身於壽域致心於玄境致世於太平致事於大成非大智大行者其孰能及此明時第九通變莫若識時識時莫若通理明理莫若虚靜虚則明靜則清清明在躬天理昭明天之變化觀易可見世之時勢觀象可驗物之情僞觀形可辨麗於形者不能無偶施於色者不能無辨天將陰雨氣必先蒸山將崩裂下必先隳人將利害貌必先變譬如巢知風穴知雨蟄蟲應候葉落知秋又如商人置雉尾於舟車之上以候陰晴天常晴則尾直堅天將雨則尾下垂無情之物尚爾而沉人乎今人不識時變者燭理未明也正己第十進德修業莫若正己己一正則無所不正一切形名非正不立一切事故非正不成日用平常設施酬酢未有不始於己者一切事事理理頭頭物物亦未有不自己出者是故進修之要必以正己爲立基正己接人人亦歸正正己處事事亦歸正正己應物物亦歸正惟天下之一正爲能通天下之萬變是知正己者進修之大用也入聖之階梯也工夫第十一清心釋累絶慮忘情少私寡慾見素抱樸易道之工夫也心清累釋足以盡理慮絶情忘足以盡性私慾俱泯足以造道素朴純一足以知天感應第十二寂然而通無爲而成不見而知易道之感應也寂然而通無所不通無爲而成無所不成不見而知無所不知動而感通不足謂之通爲而後成不足謂之成見而後知不足謂之知此三者其於感應之道也遠矣誠能爲之於未有感之於未動見之於未萌三者相須而進無所感而不通也無所事而不應也無所住而非利也盡此道者其惟顔子乎三易第十三三易者一曰天易一曰聖易三曰心易天易者易之理也聖易者易之象也心易者易之道也觀聖易貴在明象象明則入聖觀天易貴在窮理理窮則知天觀心易貴在行道道行則盡心不讀聖人之易則不明天易不明天易則不知心易不知心易則不足以通變是知易者通變之書也解惑第十四氣之消長時之升降運之否泰世之通塞天易也卦之吉凶爻之得失辭之險易象之貞晦聖易也命之窮達身之進退世之成敗位之安危心易也深造天易則知時勢深造聖易則知變化深造心易則知性命以心易會聖易以聖易擬天易以天易參心易一以貫之是名至士釋疑第十五變動有時安危在己禍福得喪皆自己始是故通變者趨時者也趨時者危亦安通變者亂亦治不失其所守者困亦亨不謹其所行者豐亦昧晦其明者處明夷而無傷恃其有者居大有而必害至遠而可應者其志同也至近而無與者其意乖也至弱而能勝者得其輔也至剛而無過者有其道也益之用凶事濟難也睽之見惡人免怨也不怕其德者無所容不有其躬者無所利獨立自恃者無功恐懼修省者獲福益於人者人益之利於人者人利之信於人者人信之惠於人者人惠之畏凶者無凶畏眚者無眚畏禍者福必至忽福者禍必至予所謂安危在己復何疑哉聖功第十六聖人所以爲聖者用易而已矣用易所以成功者虚靜而已矣虚則無所不容靜則無所不察虚則能受物靜則能應事虚靜久久則靈明虚者天之象也靜者地之象也自强不息天之虚也厚德載物地之靜也空闊無涯天之虚也方廣無際地之靜也天地之道惟虚惟靜虚靜在己則是天地在己也道經云人能常清靜天地悉皆歸其斯之謂歟清即虚也虚靜也者其神德聖功乎中和集卷之一
