front:
  text: 中和集卷之六光六
  hash: sha256:518e13cb6a7ffc49c44980fdacfbabdb89ce80bb7aa94fa68f3c428934595061
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0250_HFL_006-001a, image: hfl/0119/0119-004.png}
body:
  text: 都梁清菴瑩蟾子李道純元素撰門弟子損菴寶蟾子蔡志頤編詞沁園春六首得遇真傳便知下手成功不難待癸生之際抽鉛添汞火休太燥水莫令寒鼓動巽風搧開爐韝武煉文烹不等間金爐內箇兩般靈物煅鍊成丸先須打破疑團方透歸根復命關使赤子乘龍離宫取水金公跨虎運火燒山金公無言垞女斂袂一箇時辰鍊就丹渾吞了證金剛不壞超出人間身處玄門不遇真師徒爾勞辛若絶學無為爭知闔闢多聞博學寧脫根塵固守自然終成斷滅著有著無都不真般般假那星兒妙處參訪高人一言説破元因直指出丹頭精氣神問一竅玄關本無定位兩般靈物只在心身動靜相因有無交入五氣朝元萬善臻幽奇處把一元簇在一箇時辰道曰五行釋曰五眼儒曰五常矧仁義禮智信為根本金木水火土在中央白虎青龍玄龜朱雀皆自勾陳五主張天數五人精神魂魄意屬中黃乾坤二五全彰會三五歸元妙莫量火二南方東三成五北玄真一西四同鄉五土中宫合為三五三五混融陰返陽通玄士把鉛銀砂汞鍊作金剛道本虛無虛無生一一二成三更三生萬物物皆虛化形形相授物物交參體體元虛頭頭本一未許常人取次談虛無妙具形名相貌虛裏包含虛中密意深探致虛極工夫問老聃那虛菽湛然無中究竟虛無兼達勘破瞿曇象帝之先威音那畔清靜虛無孰有儋諸玄眷以虛無會道稽首和南叉手者誰合掌者誰擎拳者誰只這些伎倆人猶錯會無為妙理孰解操持我為諸公分明舉似老子瞿曇即仲尼思今古有千賢萬聖總是人為可憐後學無知辨是是非非沒了期況天地與人一源分判道儒釋子一理何疑見性明心窮微至命為佛為仙只在伊功成後但殊途異派到底同歸説與學人火無斤兩候無卦爻也沒抽添也無作用既無形象不必烹炮件件非真般般是假著意做工空謾勞君知否但一切聲色都是訛淆見聞知覺俱拋直打併靈臺無一毫更休言爐竈休尋藥物虛靈不昧志力堅牢神室虛間靈源澄靜就裏自然天地交全真輩荀不全真性劫運寧逃又贈靜菴口訣歷劫元神亘初祖氣太始元精這三般至寶同根並蒂欲求端的勿泥身形息定神清緣空氣固清靜無為精自凝丹頭結運陰陽符火慢慢調停尤當固濟持盈把鉛汞銀砂一處烹四象合和命基永固三元輻輳覺性虛靈性命兩全形神俱妙與道合真無變更逍遙處任遨遊八極自在縱橫又贈春谷清襌師智斷堅剛奮心決烈便透玄關把殺人手段輕輕拈出活人刀子慢慢教看一劍當空萬緣俱掃方信道瞿曇即老聃玄風播看春生寒谷覿面慈顔從他雪覆千山那突兀孤峰青似藍況擊竹拈花都成骨董揚眉瞬目也是顢預劫外風光目前薦取擘破面皮方罷參如何是那祖師的意合掌和南又贈括蒼張希微號幾菴不識不知無聲無臭名曰希微只這箇便是全真妙本人能透得即刻知幾聞法聞經説禪説道執象泥文都屬非君還悟這平常日用總是玄機仍憑決烈行持把四象五行收拾歸會兩儀妙合三元輻輳一靈不昧萬化皈依精氣凝神情緣返性迸出幨光遍界輝形神妙向太虛之外獨露巍巍曲徑旁蹊三千六百門門不同若泥在一身終須著物離於形體又屬頑空無有兼行如何下手兩下俱捐理不通修真士若不知玄竅徒爾勞工些兒妙處難窮親見了方能達本宗況聽之不聞搏之不得觀之似有覔又無蹤箇箇見成人人不識我把天機泄與公玄關竅與虛無造化總在當中又贈吳居士丹旨向上工夫乾宫立鼎坤位安爐這火候幽微元無作用抽添進退不費支吾陰往陽來雲行雨施主宰機緘總在渠心安定那虛靈不昧照破昏衢性宗悟了玄珠這命本成全太極圖向圈圈圈外圓光迸出存存存裏獨見真如一氣歸根六門互用到此全憑德行扶混塵世且藏鋒銼鋭了事凡夫又贈安間子周高士真鼎真爐不無不有惟正惟中向靜裏施工定中斡運寂然不動應感潛通老蛑含殊螟蛉呪子箇樣真機妙莫窮只道是若疑團打破頓悟真空採鉛不離坤宫運符火須當鼓巽風向北海波心生擒白虎南山火裏捉住青龍二物相投三關一輳鍊出神丹滿鼎紅藏身處且和光混俗是謂玄同又贈鄭松溪若拙若愚若慵若懶若呆若癡只道底便是造玄日用果行得去密應神機學解見知聲聞圓覺增長根塵塞肚皮都無用但死心踏地壽與天齊金仙不在天西那碧眼胡兒不必題問性宗一著從空自悟命基上事務實為基虛實相通有無交入混合形神聖立躋禪天淨看雲藏山嶽月照松溪又贈損菴入靜九轉工夫三元造化百日立基便打撲精神存決定志掀翻妄幻絶斷狐疑剔起眉毛放開心地物物頭頭一筆揮行功處便橫拖斗柄倒斡璿璣為中會取無為箇不有中間有最奇到恍惚之間窈冥之際守之即妄縱又成非不守不忘不收不縱勘這存存存底誰只恁麼待六陽數足抱箇幨兒又贈王提點慧海深澄德山高聳主人不凡沉銼鋭解紛黜聰屏智掀翻物我不露機緘立志虛無潛心混沌象帝之先密意參玄玄處老先生元姓一貫乎三曾和至士玄談故默默昏昏契老聃矧靈地虛間禪天湛寂忘知忘識無北無南收拾身心圓融造化覆哉中間總作龕神丹就看圓陀陀地照耀嵩菴又勉中菴執中妙用中是儒宗中為道本中是禪機這三教家風中為捷徑五常百行中立根基動止得中執中不易更向中中認細微其中趣向詞中剖露慎勿狐疑箇中造化還知却不在當中及四維這日用平常由中運用興居服食中裏施為透得此中便明中體中宇元來物莫違全中了把中來劈破方是男兒又贈圓菴蔣大師人心惟危道心惟微中藏化機那些兒妙處都無做造靈明不昧慧月光輝曰氣曰神惟精惟一玉瑩無瑕天地歸通玄處把坎中一畫移入南離赤龍纏定鳥龜六月裏嚴霜果太奇那白頭老子來婚素女胎仙舞罷共入黃幃布雨行雲陽和陰暢一載工夫養箇兒常溫養待玉宸頒詔足躡雲歸又勉諸門人道在常人日用之間人自不知奈叢識紛紛紅塵衮衮靈源不定心月無輝人我山高是非海闊一切掀翻便造微諸賢眷聽清菴設喻切勿狐疑先將清淨為基用靜定為菴自住持以中為門户正為牀榻誠為徑路敬作藩籬卑順和人謙恭接物服食興居弗可違常行此若工夫不間直入無為滿江紅贈虛菴日用工夫只一味存虛抱素會殊途同歸一致百慮紫極宫中元氣息懸胎鼎內三花聚問安爐立鼎事如何乾金鑄縛金烏搏玉兔捉將來封土釜這火候抽添更須防護玉寶圓成明出入法身形兆無來去便濳身直謁太清宫神常住又贊誰菴殷管轄誰是菴兒阿誰在菴中撑拄看飢來喫飯誰知甘苦角微宫商誰解聽青黃皂白誰能覩向平常日用應酬人誰區處是誰行是誰舉是誰默是誰語這些兒透得便知賓主外面形軀誰做造裏頭門户誰來去造無為畢竟住誰菴朱陵府又授覺菴道本自然但有為頭頭是錯若一味談空如何摸索無有雙忘終不了兩邊兼用遭纏縛都不如默默守其中神逸樂過去事須忘却未來事休詳度這見在工夫更休泥著六欲不生三毒滅一陽來復群陰剝悟真空抱本返元虛為真覺又贈丁縣尹三教一理三教正傳這蹊徑元來驀直問老子機緘至虛靜極釋氏性從空裏悟仲尼理自誠中入算始初立教派分三其源一道玄關常應物易幽微須默識那禪宗奧旨真空至寂刻刻兼持無間斷生生受用無休息便歸根復命體元虛藏至密又贈睡著李道判好睡家風别有箇睡眠三昧但睡裏心誠睡中澄意睡法既能知止趣便於睡裏調神氣這睡功消息睡安禪少人會身雖眠性不昧目雖垂內不閉向熟睡中間穩帖帖地一枕清風涼徹骨夢於物外間遊戲覺來時身在廣寒宫抱幨睡又贊圓菴傅居士這箇兒自歷劫以來無象沉端端正正亭亭當當細入微塵無影迹大周天界難安放更通天徹地任縱橫無遮障沒根宗沒形狀爍爍明團團亮只這箇便是本來模樣放出直超無色界收來隱在光明藏待頂門裂破現圓通金色相又贈止菴張宰公惟正惟中只這是修仙祕訣若稍有偏頗動生差别試向動中持得定自然靜裏機通徹會三元五氣入黃庭金花結運火功有時節海潮生天上月那一升一降復圓復缺十月工夫無間斷一靈妙有超生滅更問豫向上事如何無言説又贈密菴述三教教有三門致極處元來只一這一字法門深不可測老子谷神恆不死仲尼心易初無畫問瞿曇教外涅槃心密密密學神仙須定息學聖人忘智識論做佛機緘只憑慧力道釋儒流都勘破圓明覺照工夫畢看頂門迸破見真如光赫赫又贈唯菴宗道人觀復工夫要默默存存固守靜極中一動便通玄牡惚恍中間情合性虛無谷裏奇投偶我今將向上祖師機為君剖説話底非干口把物底非干手那沒腳童兒會翻筋斗解得箇些奇特處自然勘破無中有問西來的的意云何擘鼻杻又贈密菴一粒金丹這出處孰知年劫若不識根源怎生調燮況是自家元有底何須著相胡施設我分明舉似學仙人天機泄軟如綿硬似鐵利如金圓似月又不方不圓無虧無缺放則迸開天地竅收來隱在虛無穴問不收不放作麼生應難説又贈一菴三五真機應用處頭頭總是沉日用平常令巍巍地向有無中忘二見便於罔象通三昧却如何成少不成多因滯泥水鄉鉛只一味箇便是先天氣會蟾烏合璧身心合意西四歸來投北了東三便去交南二把五般攢簇入爐中丹完備又贈孫居士這點虛靈自古來無虧無缺更爍爍圓圓澄澄徹徹照破洪濛前底事分間蟾窟中間穴向菴中養箇白蝦蟆皎如雪那些兒無可説利如金團似月運化化生生了無休歇山水蒙時天癸降地雷復處玄霜結駕青鸞苴謁廣寒宫超生滅又贈默菴默即説兮這説處元來有默只默説便是金丹祕訣默識濳通為大要聲聞緣覺皆虛設向説中認得默之根無生滅會説底非干舌與默底無差别這默底寧如説底親切若向不言中得趣便於不默俱通徹將默默説説盡掀翻天機泄又贈敬菴葛道人道本無言要學者潛通默識若萬慮俱捐虛靈湛菽動處調停水中火定中究竟波羅密問玄關一竅在何宫中間覓不是心不是物不是仙不是佛只這些端的鮮人知得迷者到頭空苦志悟來不費些兒力看無中生有産靈胎陽神出又授記門人吾道玄關決不許外邊人入有學者來參防他做賊猛把殺人刀子舉活人手段輕拈出更單提獨弄逞神通誰能敵若是箇善知識便承當心不惑仗奮心剛膽逢佛殺佛舉步便能欺十聖口開便要吞三極把乾坤天地盡掀翻真奇特又令門人和採藥歸來這鼎器乾金鑄寫那些兒道理全憑主者先把根塵都掃盡從前熟處休沾惹問行工進火事如何憑般若五雷車青龍扯燒山符心鑄寫更滌慮洗心靈泉澆灑九轉功成丹道畢一靈真性還虛也那赤條條地法王身無可把滿庭芳贈焦提舉寂寞山居喧轟巿隱頭頭總是玄關賢明高士須向定中參我把活人手段殺人刀慢慢教看君還悟只今薦取超脫不為難一言明説破起初下手先鍊三三自玄宫起火運入崑山把定則雲橫谷口放行也月落寒潭工周竟大蟾成象名姓列仙班又受記定菴學佛學仙參禪窮理不離玄牝中間可憐迷謬往往相瞞一味尋枝摘葉徒坐破幾箇蒲團堪傷處外邊尋覓笑殺老瞿曇些兒真造化誠能親見膽冷心寒定菴高士好向定中參看破娘生面目把從前學解掀翻真空透髑髏迸破真主自離菴水調歌頭贈和菴王察判土釜要端正定裏問黃公流戊就己須待山下出泉蒙採藥隄防不及行火休教太過貴在得其中執中常不易天理感而通那些兒玄妙處實難窮自從會得菴中無日不春風便把西方少女嫁與南陵赤子相見永和同十月聖胎備脫蛻爍虛空又贈秋蟾周先生鉛汞了無質爐鼎假安名始因動靜迷人不覺墮聲聞這箇先天妙理日用著衣喫飯相對甚分明接物應機處不動感而靈不是心不是佛匪為金明加眼力莫教錯認定盤星片片迷雲涣散湛湛禪天獨露箇是本來真風定浪頭息月滿水光清又贈寶蟾子學佛學仙要玄妙在中誠真鉛真汞無非只是性和情但得情來歸性便見鉛來投汞二物自交併日用了無間大藥自然成識抽添明進退要持盈坤爐乾鼎陰符陽火慢調停一竅玄關透了八片頂門裂破迸出寶蟾明功行兩圓備談笑謁三清又贈劉居士在俗心不俗塵裏不沾塵處身中正何妨鬧巿與山林踐履不偏不易日用無爭無執只此是全真方寸莫教昧便是上乘人採元精鍊元氣復元神三元合一自然鼎內大丹凝更把玄風鼓動天外迷雲消散慧月朗然明叩我第一義江上數峯青又贈張蒙菴雷在地中復山下出泉蒙明斯二埋自然造化合玄同密密至虛守靜便見無中妙有九竅一齊通直下承當去箇是主人公莫著無莫著有莫著空疑團打徹只今突出妙高峰撥置紛紛外境收拾靈靈底箇生化了無窮畢竟作麼道日向嶺東紅又贈實菴道乃法之體法乃道之餘雙全道法橫拈倒用總由渠只這元神元氣便是天兵將吏除此外都無説與洞蟾子定裏做工夫守為胎用為竅假為符既明此理何須苦泥墨和宋若使精凝氣固便可驅雷役電妖怪悉皆誅行滿功成日談笑謁仙都又示衆芻分彼此道釋儒三教名殊理不殊參禪窮理只要抱本還元初解得一中造化便使三元輻輳宿疾普消除屋舍既堅固始可立丹爐鍊還丹全太極採玄珠的端消息採將坎有補離無若也不貪不愛直下離聲離色神氣總歸虛了達一切相赤子出神廬又贈白蘭谷三元祕秋水微密實難量未分清濁天地人物一包藏一乃太玄真水二氣由兹運化三極理全彰上下降升妙根本在中黃兔懷胎牛喘月蛑含光人明此埋倒提斗柄戽銀潢絶斷曹溪一派掀倒蓬萊三島無處不仙鄉誰為白蘭谷安寢感羲皇又言道三元祕秋水未悟謾猜量誠能參透洗心滌慮密歸藏意與身心不動精與氣神交合天埋自然彰三善備於我翻笑鍊玄黃性圓融心豁達德輝光牛郎織女一時會合到天潢勘破乘槎伎倆密契浴沂消息遊泳有無鄉日用别無事讀易對三皇又言性三元祕秋水都不屬思量收來毫末放開大地不能藏過去未來見在只是星兒消息體物顯然彰本自無形象隨處見青黃性源清心地靜發天光木人半夜倒騎鐵馬過銀潢正是露寒煙冷那更風清月白乘興水雲鄉識破夢中夢稽首禮虛皇百字令贈真蟾子葉大師玄關欲透做工夫妙在一陽來復天癸才生忙下手採處切須虔篤絶慮忘機清心釋纍認取虛無谷鉛銀砂汞一時辰內攢簇霎時天地相交甲庚無間龍虎齊降伏取坎填離乾體就陽火陰符行足至寶凝堅真蟾形兆宜把靈泉沃德圓功備大師名注仙籙又指中菴性命次序玄關一竅埋幽深至妙了無言説陰極陽生初動處便是採鉛時節地下雷轟山頭水降滿地紅塵雪行功之際馬猿休縱顚劣霎時虎嘯龍吟夫歡婦合鼎內丹頭結身外有身猶未了圓頓始能通徹鬱鬱黃花青青翠竹此理應難泄為君舉似水中撈取明月又贈陳制幹修真慕道樂清虛任意陶陶兀兀富貴榮華都不戀甘分清貧徹骨名利俱損是非不辨且把身埋沒真間真靜誰知如是消息為言向上機緘玄珠罔象火候無時刻一竅玄關通得透頓悟非心非佛情念雙忘有無交入胎備元神出眼晴開放光明周遍無極又贈胡秀才亘初一點瑩如如無相無形無質不蕩不搖常正定直是斷蹤絶迹變化無方顯微無間妙埋應難測為伊言破屏除緣慮塵識放教方寸虛澄裏頭寧貼方見真端的三五混融心月皎照破本元來歷爍爍圓明如如不動運化無休息靜中拈出蟾光爍破無極又指老蟾張大夫下手金丹大要不難知妙在陽時下手日用平常須謹獨莫縱虎龍奔走心要安間身須正定意在常存守始終不怠自然通透玄牡其間些子淆訛為公直指地下聽雷吼立鼎安爐非小可運用斡旋憑斗性本圓明命基牢固勘破無中有老幨成象直同天地齊壽又贈通菴太初一點本靈明元自至純無雜執著些兒千里遠悟得只消時霎方寸中虛纖塵不立何用調庚甲承當得去目前方信無法箇中顯訣難傳無名可唤貴在心通達信手拈來君薦取無罅豈容針劄人我山頭是非海裏更要知生殺養其無象忘形靈地開發又示衆破惑成仙捷徑在玄關一竅四通八達説與學人先立志悟後只消時霎可笑迷徒不求師指執著傍門法般精般氣到頭都是兜搭爭知大道堂堂坦平驀直也要師開發會得善行無轍迹玄牝自然開闔一念無生谷神不死九轉工周匝脫胎歸去大羅天上行踏西江月贈潘道人真土真鉛真汞元神元氣元精三元合一藥方成箇是全真上品動靜虛靈不昧成全實相圓明形神俱妙樂無生直謁虛皇絶境又贈善友至道本無言説全憑立志剛堅心常不昧究根源一月千潭普現會取擊風捕影便知火裏栽蓮任他海水變桑田只這本來無變又贈周守正識破無人無我何須求佛求仙隨時隨處總安禪一切幻塵不染選甚山居野處何妨鬧巿門前執中守正固三田久久神珠出現鍊丹砂詠玄牝示衆玄牝少人通説與諸公休言南北與西東不在四維並上下不在當中闔闢妙無窮天地根宗生生化化運神功動靜機緘應不息廣納包容又示衆至道本無傳只要心堅始終立志莫教偏九載三年常一定便是神仙真息自綿綿靈地平平飢來喫飯困來眠夏月單衣冬蓋被玄外無玄隱話教外名言佛書云若人欲了知三世一切佛應觀法界性一切由心造是謂有造則有化造化皆由心人皆謂造化萬物者造化之工也豫獨不然造化本無工萬物自造化也何以故一切萬物均有是心既有是心便有造化豈非自造化耶且如世間一切有形形本無無而生有是謂造有生便有滅有滅則復歸於無是謂化造造化化物之常也一真之性本有有而無象故無造無化道之常也人只知無造無化為不造化殊不知有大造化存焉非明了者其孰能知之明了之士智慧圓通則能萬事見空一心歸寂超然獨存故無造化也若不明了外著於身心世事內住於受想行識所以隨世變遷隨形生滅也目所見者謂之色領納在心謂之受既受之在心謂之想想而不已至於作為謂之行隨行善惡各有報謂之業識業識紛紛輪回之根本也故不能出造化苟有不被幻緣纏縳不被法塵染污不被迷情障礙不被愛欲苦惱則能照見五藴皆空五藴既空造化何有此即是涅槃妙心也豫謂造化由心復何疑哉道書云有無相生是謂無生有造也有生無化也又云致虛極守靜篤萬物並作吾以觀其復是謂觀復知化也知化則不化不化則安得有造非洞觀無礙者孰能及此洞達之士清靜光明故能勘破身心世事因虛幻中有有則為物物極則返返則復歸虛幻也作是觀者則知無象之象乃是實象養其無象象故常存守其無體體故全真至於純純全全合乎大方溟溟涬涬合乎無倫超出虛無之外是謂無造化也執著之者身心不定念慮交攻所以喪其無象散其無體故流浪生死常沉苦海也苟有收拾身心屏除念慮內境勿令出外境勿令入內外清靜名為照了至於內忘其心外忘其形一真洞然如太虛廓然無礙造化又何有焉儒書云不忮不求無咎無譽是謂不忮不求則不受造也無咎無譽則不受化也易繫云遠取諸物近取諸身豫謂遠取諸物則知萬緣虛假近取諸身則知五藴皆空外屏萬緣內消五藴故能順天施運歡樂於天知物之始終知幽明之故知死生之説窮埋盡性以至於命也樂天故不憂盡性故不疑非致知者孰能及此致知者誠明靜定故知生滅不停者幻形也差别不平者妄心也遷變不定者時世也敗瓌不久者事務也觀練純熟是名聖功一以貫之故無造化若不致知則不能格物不能格物則隨物變遷性命安在苟有變動不居周流六虛故天地合乎我萬物備於我至於復見天心萬有歸一無則造化息矣譬如乾坤不變動日月不運行六子何有六子不交重陰陽不升降萬物何有乾坤之體純一不雜倒正不變故無造化造無造之造大造也化無化之化大化也作是見者故知世間萬物皆是假合陰陽運用無非幻妄非天下之至變其孰能與於此觀之三教惟心也造化由心也出造化亦由心也學佛之要在乎見性若欲見性必先以決定之志奪習俗之氣以嚴持之力保洞然之明然後照破種種空妄心不著物念不隨情念是煩惱根心是法塵種念起則一切煩惱起念息則一切煩惱息心生則種種法生心滅則種種法滅念起即止皆由自心至於生滅滅已寂滅為樂是見性也今之學者不能見性者為事理二障所礙也非大觀則不能解理障非大止則不能除事障大觀謂智斷也大止謂力制也智斷純孰則理埋皆空力制純孰則事事皆空了三空之大空知一真之至真此大觀之至也即時身心世事念慮情識一齊都止此大止之至也非上上智其孰能與於此學道在乎存性若欲存性必先以慧劍斬群魔火符消六欲次以定力忘情絶慮釋纍清心至於心清纍釋慮絶情忘是謂存性真性既存則無造化今之學者為情識之所奪也欲去情識先除生滅心心無生滅身無生滅定矣去生滅心必自無念之積習純熟足可致無夢無念之靜定純熟足可致無生無夢乃見在之大事也無念乃末後之大事也無生則不造無夢則不化不造不化即不生不滅也非高上之士其孰能與於此儒學之要在乎盡性若欲盡性在明明德在止於至善知止而後有定有定則能忘物我艮卦辭云艮其背不獲其身行其庭不見其人無咎艮其背忘其心也不獲其身忘我也行其庭不見其人忘物也三者既忘何咎之有此知止之至也知止故能忘物我而全天理是謂盡性也今人不能盡性者為身心之纍也既有纍便有窒礙必以剛斷果決剛斷故能忘物果決故能忘我物我兩忘盡性至命定矣非神德聖功其孰能與於此豫見世人多以此身為有我其不思之甚也且如此身因造而有未造之前有象乎有名乎有我乎既化之後有象乎有名乎有我乎前後兩既俱無安得中間偏執有我耶殊不知身心世事本來虛妄三世推求了不可得過去杳然何在只今念念變遷未來決定如是歷劫以來大夢幻中堅執妄緣結成輪回種子是以出生入死無有了期若復有人於此夢幻境中證明了知而善消遣豈非至人乎豫一日舉此公案令門人參二三子稍合符節故作此書以贈之以心傳心若能直下承當潛通默會即時知止不謀其前不慮其後不戀只今三者混成得大自在倘徉乎大寂滅之海道遙乎無何有之鄉遊泳乎自得之場至此方知造化於此何預焉雖然更有向上事在且道喚甚麼做向上事咦掀翻無字腳粉碎太虛空方為了事漢祕之祕之絶學無憂篇並敘所為絶學者非不學也若以不學為絶學則罔無所知只同常流也此所謂絶學者博學而至於絶學也蓋由世人多學為奇特轉學轉不會也聖人云其出彌遠其知彌少又云多則惑少則得正謂此也前儒云有為終日息無為便不息即此意也故作是篇以證之使學徒不為聲聞緣覺學解見知所纍也日用總玄玄時人識未全當推心上好放下口頭禪法法非空法傳傳是妄傳不曾修福始焉能有禍先不益便無損不變豈能遷不垢亦不淨無缺亦無圓莫著嗔和喜何愁迍與邅不作善因果那得惡因緣不聞興廢事名利不相牽精粗無憂惡妍醜不憎憐不償歡喜債都無恩怨纏打開人我網跳出是非圈清虛不好古恬淡倦希賢休思今世後放下未生前從他佛是佛任伊仙是仙既無塵俗纍何憂業火煎有無俱不立虛實任相連都緣無取捨自然無過愆來去渾忘却死生何預焉居止無餘欠隨處任方圓飢來一碗飯渴則半甌泉興來自消遣困來且打眠達者明此義休尋天外天見前赤灑灑末後亮姢姢中和集卷之六
