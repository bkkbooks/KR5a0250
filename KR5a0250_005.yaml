front:
  text: 中和集卷之五光五
  hash: sha256:9bf5eb9d664bf903c5cec0d89f3126f1a0d19e91191c3e77baeed419829b9ef5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0250_HFL_005-001a, image: hfl/0118/0118-180.png}
body:
  text: 都梁清菴瑩蟾子李道純元素撰門弟子損菴寶蟾子蔡志頤編詩述工夫十七首九轉還丹下手功要知山下出泉蒙安爐妙用憑坤土運火工夫藉巽風兊虎震龍才混合坎男離女便和同自從四象歸中後造化機緘在我儂右發蒙鍊汞烹鉛本沒時學人當向定中推客塵欲染心無著天癸才生神自知清寂金來歸性本精凝坎去補南離兩般靈物交并後陰盡陽純道可期右採藥既通天癸始生時自有真陽應候回三昧火從離位發一聲雷自震宫來氣神和合生靈質心息相依結聖胎透得裏頭消息子三關九竅一齊開右進火真鉛真汞大丹頭採取當於罔象求有作有為終有纍無求無執便無憂常清常靜心珠現忘物忘機命寶周動靜兩途無窒礙不離當處是瀛洲右日用全真妙理不難行惟恐隨緣逐色聲萬幻不侵清自絶一心無染念安生屏除人我全天理把握陰陽合泰亨說與修丹高士道色聲無漏性圓明右固形造道元來本不難工夫只在定中間陰陽上下常升降金水周流自返還紫府青龍交白虎玄宫地軸合天關雲收雨散神胎就男子生兒不等間右交合真常之道果何難只在如今日用間一合乾坤知闔闢兩輪日月自循還歸根自有歸根竅復命寧無復命關踏遍兩重消息子超凡越聖譬如間右透關谷神不死為玄牝箇是乾坤闔闢機往往來來絡不息推推蕩蕩了無違白頭老子乘龍去碧眼胡兒跨虎歸試問收功何所證周天匝地月光輝右出入口頭三昧謾矜誇闊論高談事轉差比似著形求實相却如捏目起空花隨將物去終歸幻裂轉頭來便到家莫怪清菴多臭口打開心孔要無遮右警衆三千六百法傍門執著之人向裏昏每日只徒心有見何時得悟命歸根聰明特達何須道智慧精通不足論一切形名聲色相到頭都是弄精魂右挽邪夜中昏睡怎禁他鬼面神頭見也麼昏散相因由氣濁念緣斷續為陰多潮來水面潯堤岸風定江心絶浪波性寂清空心不動生無昏散睡無魔右敵魔火符容易藥非遙天癸生如大海潮兩種汞鉛知採取一齊物欲盡捐消掀翻萬有三元合鍊盡諸陰五氣朝十月脫胎丹道畢嬰兒形兆謁神霄右顯正三元大藥意心身著意心身便係塵調息要調真息息鍊神須鍊不神神頓忘物我三花聚猛𢬵機緣五氣臻八達四通無窒礙隨時隨處闡全真右調燮身自空來强立名有名心事便牽縈陰陽消長磨今古日月升沉運死生會向時中存一定便知日午打三更雖然處世憑師授出世工夫要自明右明本明師授我鑄神鋒全藉陰陽造化功煅鍊乾剛坤作冶吹噓離火巽為風做成龍象心官巧掃蕩妖氛志帥雄學道高人知此趣等間劈碎太虛空右鑄劍蟾窟清幽境最佳主人顚倒作生涯玉爐煅鍊黃金液金鼎烹煎白靈芽斡運周天旋斗柄推遷符火運雷車自從打透都關鎖恣意銀河穩泛槎右蟾窟吾菴非是等間菴未許常人取次觀一婦一夫能做活三男三女打成團裏頭世界元來大外面虛空未是寬試問主人為的事報言北斗面南看右清菴詠真樂十二首佛仙總是世人為爭奈迷途自不知若匪貪名爭計較定須逐利苦奔馳波波漉漉擔家業劫劫忙忙贍婦兒假使財榮妻貌美無常到後豈相隨爭似全真妙更奇箇中真樂自心知丹從不鍊鍊中鍊道向無為為處為息念息緣調祖氣忘聞忘見養嬰兒自從立定丹基後五彩光華透幌帷爐用坤兮鼎用乾窮微盡理便通仙無非攝伏情歸性便是烹煎汞合鉛絶盡機緣丹赫赤全存正定寶凝堅即斯便是抽添法不必忉忉臾問玄火符容易藥非遙造化全同大海潮藥物只於無裏採火丹全在定中燒九三輻輳諸緣息二八相交五氣朝陰盡陽純功就也真人出見謁神霄鍊丹先把氣神調法水頻澆慧火燒三物混融三性合一陽來復一陰消金爐端正千神會寶鼎功成萬象朝藥就丹圓神脫蛻全身靈出赤條條先天至理妙難窮鉛産西方汞産東水火二途分上下玄關一竅在當中有知不有真為有空會無空實是空無有有無端的意滔滔海底太陽紅寂鈸不動契真常消盡群陰自復陽坤裹黃婆生赤子離中姹女嫁呆郎山頭水降黃芽長地下雷轟白雪揚萬里銀河無點翳金蟾獨露發神光妖嬈少女嫁金公全籍黃婆打合功一對夫妻才會合兩情雲兩便和同間時黃飲朱陵府醉後同眠紫極宮暮樂朝歡恩義重一年生箇小孩童人人身內有夫妻爭奈愚癡太執迷不向裏頭求造化却於外面立丹基妄將銜女三峯術僞作軒轅九鼎竒箇樣畜生難懴悔閻公不久牒來追身內夫妻說與公青衣女子白頭翁金情木性相次合黑汞紅鉛自感通對月臨風神逸樂行雲布雨與無窮這些至理誠能會凝結真胎反掌中九選七返大丹頭學者須當定裏求些子神機誠會得兩般靈物便相投三年造化須臾備九轉工夫頃刻周便把鼎爐掀倒了丹光燭破四神州不立文書教外傳人人分上本來圓玄風細細清三境慧月娟娟印百川兜率三關皆假喻天龍一指匪真詮威音那畔通消息不是濓溪太極圈詠四緣警世身心世事四虛名多少迷人被繫縈禍患只因權利得輪回都為愛緣生安心絶迹從身動處世忘機任事更觸境遇緣常委順命基永固性圓明詠葫蘆靈苗種子産先天蒂固根深理自然逐日壅培坤位土依時澆灌坎中泉花開白玉光而瑩子結黃金圓且堅成就頂門開一竅箇中别是一坤乾心鏡採將乾曠入坤爐六合虛空作一模法相就時圓爍爍水銀磨處瑩如如放光周遍三千界收斂歸藏一黍珠舉起分明全體現更須打破合元樞為孚菴指玄牝玄門牝户不難知收拾身心向內推會得兩儀推蕩理便知一氣往來時乾坤闔闢無休息離坎升沉有合離我為孚菴明措出念頭復處立丹基和翁學録韻密意參同白玉幨元來窮理便通仙未明太極生三五徒涉蓬萊路八千釋氏家風憑祖印羲皇道統必心傳青天獨露瑶臺月普印千潭一樣圓贈鄧一蟾禪宗理學與全真教立三門接後人釋氏藴空須見性儒流格物必存誠丹臺留得星星火靈府銷鎔種種塵會得萬殊歸一致熙臺內外總登春自得七首打破鴻濛竅都無佛與仙即非心外妙不是口頭禪儘日優游過通宵自在眠委身濳絶境萬事付之天一切有為法般般盡是塵窮通諸物理放下此心身隨處安禪定趨恃樂至真每將周易髓警拔世間人得造無為妙終朝不出門機緣全絶斷天理自然存日用天行健平常地勢坤警提門弟子復命與歸根打透都關鎖天然合大同龜毛元自緑鶴頂本來紅可道非常道行功是外功此兒真造化恍惚窈冥中自得身心定凝神固氣精身間超有漏心寂證無生烏兔從來去乾坤任變更廓然無所礙獨露大光明日用别無事維持一己誠靜中調氣息動則順人情晦德同其俗含華不顯明真間真樂處常靜與常清靜抱無名朴塵情了不侵汞鉛鎔作粉瓦礫變成金覿見羲黃面參同釋老心頓空超實際無古亦無今自題相面黃肌瘦子看來有甚奇分明喬眼孔剛道絶聞知勘破三千法參同十七師低頭叉手處泄盡那些兒鏡中燈二首寶鏡本無相傳燈發慧光真如元瑩淨法體本熒煌金鼎燒真火華池浴太陽箇中端的意元不離中黃靜室開心鏡虛堂剔慧燈外頭明皎皎裏面晃騰騰黍米光中現銀蟾水底澄懸胎金鼎內一粒大丹凝詠藕二首一種靈苗異其他回不同法身元潔白真性本玲瓏外象頭頭曲中間竅竅通淤泥淹不得發露滿池紅我本清虛種玲瓏貫古今為厭名利冗且隱淤泥深每有濟人意常懷克己心幾多撈漉者那箇是知音卓菴二首擇盡虛無地因緣在玉京築基須穩穩立鼎要平平直堅須彌柱橫安太極楹青天為蓋覆菴主樂無生大地剗教平菴基即日成來山從丙入去水放西行門户全通達窗櫺透底明菴中誰是伴月白與風清中和集卷之五
