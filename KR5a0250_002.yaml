body:
  text: 都梁清菴瑩蟾子李道純元素撰門弟子損菴寶蟾子蔡志頤編金丹妙訣金丹圖象説左四圖法象顯明至道玄玄之旨撑天拄地太模糊安誰為安名號玉爐爐曾向此中經煅鍊出無入有盡由渠不無不有不當中立外面虛無裏面空鼎決烈丈夫掀倒看元來那箇本來紅威音那畔本來明還昧了皆因著幻形丹若向丹中拈得出圓陀陀地至虛靈道本無為法自然返聖人立象假名圈本平常日用全彰露打破方知象帝先二圖訣取出中畫補還復乾純陽命本固無礙性珠圓受觸全天理離塵合上禪採鉛知下手三疊舞胎仙口訣譬喻火候圖十一初一子玄宫復初九十二初三丑進臨九二正初六寅徐進泰九三二初八卯沐銀河壯九四三十一辰遇玉闕夬九五四十四望己止乾上九望五退十六午崙山垢初六六十八未退遁六二七二十申徐退否六三八二十三酉浴絳宫觀六四九二十六戌守中剝六五十二十八亥戰坤上六外藥圖內藥圖金丹內外二藥圖説外藥可以治病可以長生久視內藥可以超越可以出有入無大凡學道必先從外藥起然後自知內藥高上之士夙植德本生而知之故不鍊外藥便鍊內藥內藥無為無不為外藥有為有以為內藥無形無質而實有外藥有體有用而實無外藥色身上事內藥法身上事外藥地仙之道內藥水仙之道二藥全天仙之道外藥了命內藥了性二藥全形神俱妙外藥初關鍊精化氣先要識天癸生時急採之中關鍊氣化神調和真息周流六虛自太玄關逆流至天谷穴交合然後下降黃房入中宫乾坤交姤罷一點落黃庭上關鍊神還虛以心鍊念謂之七返情來歸性謂之九還內藥內藥乃鍊神之要形神俱妙與道合真內藥先天一點真陽是也譬如乾卦中一畫交坤成坎水是也中一畫本是乾金異名水中金總名至精也至精固而復祖氣祖氣者乃先天虛無真一之元氣非呼吸之氣如乾中一畫交坤成坎了却交坤中一陰入于乾而成離離中一陰本是坤土故異名曰砂中汞是也道生一一生二二生三三生萬物虛化神神化氣氣化精精化形已上謂之順萬物含三三歸二二歸一鍊乎至精精化氣氣化神已上謂之逆丹書謂順則成人逆則成丹上藥三品精氣神體則一用則二何謂體本來三元之大事也何謂用內外兩作用是也內藥先天至精虛無空氣不壞元神外藥交感精呼吸氣思慮神一鍊精化氣初關二鍊氣化神中關三鍊神還虛上無關為此三段工夫到了則一若向這裏具隻眼三教之大事畢矣其或未然細參後事一鍊精化氣歸道乃水府求玄丹書云癸生須急採望遠不堪嘗所謂採者不採之採謂之採也茍實有所採坎中一畫如何得升精乃先天至靈之化因動而有身身中之至精乃元陽也採者採此也譬如乾乃先天至靈始因一動交坤而成坎即至靈化元精之象也坎為水坎中一畫元乾金假名曰水中金金乃水之母反居水中故曰母隱子胎也採鉛消息難形筆舌達者觀雷在地中復先王至日閉關商旅不行后不省方之語思過半矣餘存口訣二鍊氣化神崇釋則離宫修定丹書云真土制真鉛真鉛制真汞鉛汞歸土釜身心寂不動斯言盡矣既得真鉛則真汞何慮乎不凝鍊氣之要貴乎運動一闔一闢一往一來一升一降無有停息始者用意後則自然一呼一吸奪一年之造化即太上云玄牝之門是謂天地根綿綿若存用之不勤正此義也達者若於乾坤易之門與夫復姤之內上留意鍊氣之要備矣三鍊神還虛工夫到此一箇字也用不著三五指南圖局説紫陽真人悟真篇詩云三五一都三箇字古今明者實然希東三南二同成五北一西方四共之戊己還從生數五三家相見結嬰兒嬰兒是一含真氣十月胎成入聖基只此五十六宇貫徹諸子百家丹經子書若向這裏具隻眼參學事畢其或未然向注腳下商量三五一都三箇字三元五行一氣也古今明者實然希亘古亘今知者鮮矣東三南二同成五東三木也南二火也木生火木乃火之母兩性一家故曰同成五也北一西方四共之北一水也西四金也金生水金乃水之母兩性一家故曰共之戊己還從生數五者土之生數也五居中無偶自是一家所謂三家相見者三元五行混而為一也故曰三家相見結嬰兒所謂嬰兒者亦是假名純一之義也故曰嬰兒是一舍真氣也十月胎成入聖基者三百日胎二八兩藥烹之鍊之成之熟之超凡入聖之大功也故曰入聖基也以一身言之東三木也我之性也西四金也我之情也南二火也我之神也北一水也我之精也性乃心之主心乃神之舍性與神同係乎心東三南二同成五也精乃身之主身者情之係精與情同係乎身北一西方四共之也戊己中土意也四象五行意為之主宰意無偶自是一家也修鍊之士收拾身心意則自然三元五行混而為一也丹書云收拾身心為採藥正謂此也收拾身心之要在乎虛靜虛其心則神與性合靜其身則精與情寂意大定則三元混一此所謂三花聚五氣朝聖胎凝情合性謂之金木併精合神謂之水火交意大定謂之五行全丹書云鍊精化氣為初關身不動也鍊氣化神為中關心不動也鍊神化虛為上關意不動也心不動東三南二同成五也身不動北一西方四共之也意不動戊己還從生數五也身心意合即三家相見結嬰兒也作是見者金丹之能事畢矣神仙之大事至是盡矣至於丹書種種法象種種異名並不外乎身心意也雖然猶有不能直下會意者今立異名法象圖局于後具眼者流試著眼看譬喻圖身心意曰三家精氣神曰三元精神魂魄意曰五氣鉛汞銀砂土曰五行三家相見曰胎圓三元合一曰丹成大德三年純陽誕日書于鑾江中和菴玄關一竅贈門人夫玄關一竅者至亥至要之機關者非印堂非𩕄門非肚臍非膀胱非兩腎非腎前臍後非兩腎中間上至頂門下至腳跟四大一身才著一處便不是也亦不可離了此身向外尋之所以聖人只以一中宇示人只此中宇便是也我設一喻令爾易知且如傀儡手足舉動百樣趨蹌非傀儡能動是絲線牽動雖是線上關捩却是弄傀儡底人牽動咦還識這箇弄傀儡底人麼休更疑惑我直説與汝等傀儡比此一身絲線比亥關弄傀儡底人比主人公一身手足舉動非手足動是玄關使動雖是亥關動却是主人公使教玄關動若認得這箇動底關捩又奚患不成仙乎試金石夫金丹者虛無為體清靜為用無上至真之妙道也世鮮知之人鮮行之於是聖人用方便力開善誘門強立名象著諸丹書接引後學蓋欲來者誦言明埋默識濳通則行之頓超真境奈何後學不窮其理執著筌蹄妄引百端支離萬狀將至道碎破為曲徑旁蹊三千六百良不得其傳故也況今之無知淺學將聖人經旨妄行箋注乖訛尤甚安得不悮後來雖苦志之士亦不能辨其邪正深可憐憫豫因是事故作此試金石而辨其真偽俾諸學者不被眩惑決然無疑直超道岸聖師曰道法三千六百門人人各執一為根誰知些子玄微處不在三千六百門豫謂祖師老婆心切故作是詩也若復有人作如是見者大地皆黃金其或未然須當試過於是乎書最上一乘無上至真之妙傍門九品下三品御女房中三峯採戰食乳對爐女人為鼎天癸為藥産門為生身處精血為大丹頭鑄雌雄劍立陰陽爐謂女子為純陽措月經為至寶採而餌之為一月一還用九女為九鼎為九年九返令童男童女交合而採初精取陰中黍米為玄珠至於美金花弄金槍七十二家強兵戰勝多入少出九淺一深如此邪謬謂之泥水丹法三百餘條此大亂之道也乃下品之下邪道也又有八十四家接法三十六般採陰用胞衣為紫河車鍊小便為秋石食自己精為還元捏尾閭為閉關夫婦交合使精不過為無漏採女經為紅圓子或以五金八石修鍊為丸令婦人服之十月後産肉塊為至藥採而服之如此謬術不欲盡舉約有三百餘條乃下品之中外道也又有諸品丹竈爐火燒爇五金八石勾庚乾汞點茅燒艮撥灰弄火至於靈砂外藥三遜五假金石草木服餌之法四百餘條乃下品之上外道也右下三品共一千餘條貪淫嗜利者行之中三品休糧辟穀忍寒食穢服餌椒木曬背卧冰日持一齋或清齋或食物多為奇特或飲酒不醉為驗或減食為抽添或不食五味而食三白或不食煙火食或飮酒食肉不藉身命自謂無為或翻滄倒海種種捏怪乃中品之下也吞霞服氣採日月精華吞星曜之光服五方之氣或採水火之氣或存思注想遨遊九州為運用或想身中二氣化為男女象人間夫婦交採之狀為合和一切存想種種虛妄等法乃中品之中也傳授三歸五戒看誦修習傳信法取報應行考赴取歸程歸空十信三際九接膽星禮斗或持不語或打勤勞持守外功已上有為乃中品之上漸次近道也右三品一千餘條行之不怠漸入佳境勝别留心上三品定觀鑒形存思吐納摩撫消息八段錦六字氣視頂門守臍蒂吞津液攪神水或千口木為活或指舌為赤龍或擦身令熱為火候或一呵九摩求長生或鍊稠唾為真種子或守丹田或兜外腎至於煮海觀鼻以津精涎沫為藥乃上品之下也閉息行氣屈伸導引摩腰腎守印堂運雙晴搖夾脊守臍輪或以雙晴為日月或以眉間為玄關或叩齒為天門或想元神從頂門出入或夢遊仙境或默朝上帝或以昏沉為入定或數息為火候或想心腎黑白二氣相交為既濟乃上品之中也般精運氣三火歸臍調和五臟十六觀法固守丹田服中黃氣三田還返補腦還精雙提金井夾脊雙關握固內視種種般運乃上品之上也右三品一千餘條中士行之亦可却病漸法三乘下乘者以身心為鼎爐精氣為藥物心腎為水火五臟為五行肝肺為龍虎精為真種子以年月日時行火候咽津灌溉為沐浴口鼻為三要腎前臍後為玄關五行混合為丹成此乃安樂之法其中作用百餘條若能忘情亦可養命與上三品稍同作用處别中乘者乾坤為鼎器坎離為水火烏兔為藥物精神魂魄意為五行身心為龍虎氣為真種子一年寒暑為火候法水溉灌為沐浴內境不出外境不入為固濟太淵絳宫精房為三要泥丸為玄關精神混合為丹成此中乘養命之法其中作用數十條與下乘大同小異若行不怠亦可長生久視上乘者以天地為鼎爐日月為水火陰陽為化機鉛汞銀砂土為五行性情為龍虎念為真種子以心鍊念為火候息念為養火含光為固濟降伏內魔為野戰身心意為三要天心為玄關情來歸性為丹成和氣薰蒸為沐浴乃上乘延生之道其中與中乘相似作用處不同亦有十餘條上士行之始終如一可證仙道最上一乘夫最上一乘無上至真之妙道也以太虞為鼎太極為爐清靜為丹基無為為丹母性命為鉛汞定慧為水火窒欲懲忿為水火交性情合一為金木併洗心滌慮為沐浴存誠定意為固濟戒定慧為三要中為玄關明心為應驗見性為凝結三元混一為聖胎性命打成一片為丹成身外有身為脫胎打破虛空為了當此最上一乘之妙至士可以行之功滿德隆直超圓頓形神俱妙與道合真中和集卷之二
