body:
  text: 都梁清菴瑩蟾子李道純元素撰門弟子損菴寶蟾子蔡志頤編論性命論夫性者先天至神一靈之謂也命者先天至精一氣之謂也精與性命之根也性之造化系乎心命之造化系乎身見解智識出於心也思慮念想心役性也舉動應酬出於身也語默視聽身纍命也命有身纍則有生有死性受心役則有往有來是知身心兩宇精神之舍也精神乃性命之本也性無命不立命無性不存其名雖二其理一也嗟乎今之學徒緇流道子以性命分為二各執一邊互相是非殊不知孤陰寡陽皆不能成全大事修命者不明其性寧逃劫運見性者不知其命末後何歸仙師云鍊金丹不達性此是修行第一病只修真性不修丹萬劫英靈難入聖誠哉言歟高上之士性命兼達先持戒定慧而虛其心後鍊精氣神而保其身身安泰則命基永固心虛澄則性本圓明性圓明則無來無去命永固則無死無生至於混成圓頓直入無為性命雙全形神俱妙也雖然却不可謂性命本二亦不可做一件説本一而用則二也荀或執著偏枯各立一門而入者是不明性命者也不明性命則支離為二矣性命既不相守又焉能登真躡境者哉卦象論海瓊真人云上品丹法無卦爻諸丹書皆用卦爻者何也此聖人設教而顯道也古云大道無言無言不顯其道即此義也所謂卦者挂也如挂物於空懸示人猶天垂象見吉凶使人易見也象也者像此者也爻也者效此者也卦有三爻象三才即我之三元也畫卦六爻象六虛即我之六合也丹書用卦用爻者蓋欲學者法象安爐依爻進火易為取則也海瓊真人謂無卦爻者警拔後人不可泥於爻象即此用而離此用也譬如此身未生之前如如不動即太極未分之時因有此身立性立命即太極生兩儀也有形體便有性情即兩儀生四象也至於精神魂魄意氣身心悉皆足具即四象生八卦也先賢云崇釋則離宫修定歸道乃水府求玄謂修鍊性命之要也離宫修定者持戒定慧使諸塵不染萬有一空即去離中之陰也水府求玄者鍊精氣神使三花聚鼎五氣朝元而存坎中之陽也特達之士二理總持負陰抱陽虛心實腹即取坎中之陽而補離中之陰再成乾體也紫陽真人云取將坎位中心實點化離宫腹裏陰自此變成乾健體潛藏飛躍盡由心正謂此也行火候用卦爻者乾坤二卦健順相因往來推蕩定四時成歲四德運化無有窮也行火進退抽添加減則而象之簇一年於一月簇一月於一日簇一日於一時簇一時於一刻簇一刻於一息大自元會運世細至一息之微皆有一周之運達此埋者進火退符之要得矣雖然丹道用卦火候用爻皆是譬喻却不可執在卦爻上當知過河須用筏到岸不須船得魚忘筌得兔忘蹄可也紫陽真人云此中得意休求象若究群爻謾役情又云不刻時中分子午無爻卦內定乾坤皆謂此也豫謂生而知之者不求自得不勉而中又豈在誘喻故上品丹法不用卦爻也中下之士不能直下了達須從漸入故諸丹書皆以卦爻為法則也達者味之而自得之矣説死生説太上云人之輕死以其求生之厚是以輕死又曰夫惟無以生為者是賢於貴生是謂求生了不可得安得有死耶有生即有死無死便無生故知性命之大事死生為重焉欲知其死必先知其生知其生則自然知死也子路問死子曰未知生焉知死大哉聖人之言也易繫所謂原始要終故知死生之説其斯之謂歟豫謂學道底人欲要其終先原其始欲明末後究竟只今只今脫灑末後脫灑只今自由末後自由亘古亘今歷代聖師脫胎神化應變無窮者良由從前淘汰得淨潔末後所以輕舉若復有人於平常一一境界覷得破打得徹不為物眩不被緣牽則末後一一境界眩他不得一一情緣牽他不住我見今時打坐底人才合眼一切妄幻魔境都在目前既入魔境與那陰魔打成一片不自知覺間有覺者亦不能排遣却如箇有氣底死人六根具足不能施為被他撓亂擺撥不下只今既不得自由生死岸頭怎生得自由去也若是箇決烈漢合眼時與開眼時則一同於一一妄幻境界都無染著去來無礙得大自在只今既脫灑末後奠患其不脫灑耶清菴道人不借兩片皮為損菴輩饒舌只如今做底工夫便是末後大事只今是因末後是果只今一切念慮都屬陰趣一切幻緣都屬魔境若於平常間打併得潔淨末後不被他惑亂念慮當以理遣幻緣當以志斷念慮絶則陰消幻緣空則魔滅陽所以生也積習久久陰盡陽純是謂仙也或念增緣起縱意隨順則陰長魔盛陽所以消也積習久久陽盡陰純死矣大修行人分陰未盡則不仙一切常人分陽未盡則不死作是見者玄門高士諸法眷等立決定志存不疑心直下打併教赤灑灑空蕩蕩勿令秋毫許塵染著便是清靜法身也汝若不著一切相則一切相亦不著汝汝若不染一切法則一切法亦不執汝汝若不見一切物則一切物亦不見汝汝若不知一切事則一切事亦不知汝汝若不聞一切聲則一切聲亦不聞汝汝若不緣一切覺則一切覺亦不緣汝至於五藴六識亦復如是六塵不入六根清靜五藴皆空五眼圓明到這裏六根互用通身是眼群陰消盡遍體純陽性命雙全形神俱妙與道合真也更有甚死生可超更有甚只今末後也無因也無果和無也無倒大輕快倒大自在咦無生法忍之妙至是盡矣至元壬辰上元日清菴瑩蟾子書于中和菴贈蔡損菴輩動靜説太上云致虛極守靜篤萬物並作吾以觀其復此言靜極而動也夫物藝藝各復歸其根歸根曰靜是謂復命此言動極而復靜也又云復命曰常此言靜一動動一靜道之常也荀以動為動靜為靜物之常也先賢云靜而動動而靜神也動無靜靜無動物也其斯之謂歟是知保身心之要無出乎動靜也學道底人收拾身心致虛之極守靜之篤則能觀復易曰復其見天地之心乎夫復之為卦自坤而復自靜而動也五陰至靜一陽動於下是謂復也非靜極而動乎觀復則知化知化則不化不化則復歸其根也歸根曰靜是謂復命非動而復靜乎易繫云闔户之謂坤闢户之謂乾一闔一闢之謂變往來不窮之謂通一闔一闢一動一靜也往來不窮動靜不已也互動互靜機緘不已運化生成是謂之變推而行之應變無窮是謂之通太上云谷神不死是謂亥牝此言虛靈不昧則動靜之機不可掩也又云玄牝之門是謂天地根即乾陽坤陰一闔一闢而成變化也又云綿綿若存用之不勤即往來不窮之謂通也天根闔闢猶人之呼吸也呼則接天根是謂闢也吸則接地根是謂闔也呼則龍吟雲起吸則虎嘯風生是謂變也風雲際會龍虎相交動靜相因顯微無間是謂通也豫所謂呼吸者非口鼻也真息綿綿往來不息之謂也荀泥於口鼻而為亥牝又焉能盡天地鼓舞之神哉知天地變動神之所為者是名上士達是理者則知乾道健而不息即我之心動而無為工夫不息也坤道厚德載物即我之身靜而應物用之無盡也心法天故清身法地故靜常清常靜則天地闔闢之機我之所維也經云清者濁之源動者靜之基人能常清靜天地悉皆歸正謂此也經間菴輩叩豫保身心之要豫以動靜告之蓋欲使其收拾身心效天法地之功用也夫保身在調燮保心在撿攝調燮貴乎動撿攝貴乎靜一動象天一靜象地身心俱靜天地合也至靜之極則自然真機妙應非常之動也只道動之機關是天心也天心既見亥關透也玄關既透藥物在此也鼎爐在此矣火候在此矣三元八卦四象五行種種運用悉具其中矣工夫至此身心混合動靜相須天地闔闢之機盡在我也至於心歸虛寂身入無為動靜俱忘精凝氣化也到這裏精自然化氣氣自然化神神自然化虛與太虛混而為一是謂返本還元也咦長生久視之道至是盡矣至元壬辰上元後四日清菴瑩蟾子書于中和精舍贈經間菴輩歌原道歌贈野雲玄流若也透玄關躡景登真果不難只是星兒孔竅子迷人如隔萬重山世間縱有金丹客太半泥文并著物雖然苦志教門中却似癡貓守空窟或將金石為丹母或云口鼻為玄北或云心腎為坎離或云精血為奇耦勞形苦體費精神妙本支離道不伸直待靈源都喪盡尚猶執著不回身人人自有長生要道法法人人不肖浮華亂目孰回光薄霧牽情誰返照我觀潁川野雲翁奇哉道釋俱貫通玉鎖金枷齊解脫急流勇退慕玄風我今得見知音友故把天機都泄漏坎水中間一點金急須取向離中輳一句道心話與賢從今不必亂鑽研九夏但觀龍取水明明天意露真詮會得此機知採藥地雷震處鼓橐籥霎時雲雨大雱霈萬氣咸臻真快樂水中取得玉蟾蜍送入懸胎鼎內儲進火退符功力到無中生有結玄珠獲得玄珠未是妙調神溫養猶深奧鉛要走而汞要飛水怕寒兮火怕燥火周須要識持盈靜定三元大寶成迸破頂門神蛻也與君同步謁三清鍊虛歌並引道本至虛虛無生氣一氣判而兩儀立焉清而上者曰天濁而下者曰地天圓而動北辰不移主動者也地方而靜東注不竭主靜者也北辰天地之心東注天地之氣以虛養心心所以靜以虛養氣氣所以運人心安靜如北辰之不移神至虛靈作是見者天道在己氣常運動如東注之不竭形固常存作是見者地道在己天地之道在己則形神俱妙陰陽不可得而推遷超出造化之外也是知虛者大道之體天地之始動靜自此出陰陽由此運萬物自此生是故虛者天下之大本也古杭王高士以竹名齋蓋有取於此也處事以直處世以順處心以柔處身以靜竹之節操也動則忘情靜則忘念應機忘我應變忘物竹之中虛也立決定志存不疑心內外圓通始終不易竹之歲寒也廣參至士遍訪明師接待雲水混同三教竹之叢林也兼之見素抱朴少私寡欲調息運誠觀化知復非天下之致虛其孰能與於此以竹名齋宜矣辛卯歲有全真羽流之金陵中和精舍嘗談盛德豫深重之自後三領雲輪觀其言辭有致虛安靜之志於是平橫空飛劍而訪先生是乃己亥重陽日也觀其行察其言足見其深造玄理者也於是平以珏蟾扁子名珏之為字二玉相並俾之虛實相通為全形神之大方也虛為實體實為虛用虛實相通去來無礙玉又取其潔白之義虛室生白神宇泰定自然天光發露普照無私也工夫至此仙佛聖人之能事畢矣辭已既故作是篇以記之歌曰為仙為佛與為儒三教單傳一箇虛亘古亘今超越者悉由虛裏做工夫學仙虛靜為丹旨學佛潛虛禪已矣扣豫學聖事如何虛中無我明天理道體虛空妙莫窮乾坤虛運氣圓融陰陽造化虛推蕩人若濳虛盡變通還丹妙在虛無谷下手致虛守靜篤虛極又虛元氣凝靜之又靜陽來復虛心實腹道之基不昧虛靈採藥時虛己應機真日用太虛同體丈夫兒採鉛虛靜無為作進火以虛為橐籥抽添加減總由虛粉碎虛空成大覺究竟道沖而用之解紛銼鋭要兼持和光混俗忘人我象帝之先只自知無畫以前焉有卦乾乾非上坤非下中間一點至虛靈八面玲瓏無縫罅四邊固密剔渾淪箇是中虛玄牝門若向不虛虛內用自然闔闢應乾坤玄牝門開功則極神從此出從此入出出入入復還虛平地一聲春霹靂霹靂震時天地開虛中迸出一輪來圓陀陀地光明大無欠無餘照竹齋竹齋主人大奇特細把將來應時物虛裏安神虛裏行發言闡露虛消息虛至無虛絶百非潛虛天地悉皆歸虛心直節青青竹箇是鍊虛第一機破惑歌堪嗟世上金丹客萬别千差殊不一執象泥文胡作為摘葉尋枝徒費力採日精吸月華含光服氣及吞霞斂身偃仰為多事轉晴捏目起空花鍊稠唾咽津液指涅尾閭並夾脊注想存思觀鼻端翻滄倒海食便溺守寂淡落頑空兀兀騰騰做奔功更有按摩并數息總與金丹埋不同八段錦六宇氣辟穀休糧事何濟執著三峰學採陰九淺一深為進退擾腰兜腎守生門屈伸導引弄精魂對爐食乳強兵法箇樣家風不足論更有縮龜並閉息熊伸鳥引虛勞役摩腰居士腹中溫行氣先生面上赤擊天鼓抱崑崙叩齒集神視頂門虛響認為雄虎嘯肚鳴道是牝龍吟燒丹田調煮海晝夜不眠苦打睚單衣赤腳受煎熬前生欠少飢寒債常持不語謾徒然默朝上帝怎升遷呵手提囊真凡伯摩娑小便更狂顚弄金槍提金井美貌婦人為藥鼎採他精血唤真鉛喪失元和猶不省有等葛藤口鼓禪鬥唇合舌逞能言指空詰空乾打鬨堅拳堅指不知原提話頭并觀法捷辨機鋒喧霄雲拈槌堅拂接門徒瞬目揚眉為打發參公案為禪提真箇高僧必不然理路多通為智慧明心見性待驢年道儒僧休執著返照回光自忖度忽然摸著鼻孔尖始信從前都是錯學仙輩絶談論受氣之初窮本根有相有求俱莫立無形無象更休親心非火腎非水凡精不可云天癸黃婆元不在乎脾玄牝亦休言口鼻卯非兔酉非雞子非坎兮午非離一陽不在初三四持盈何執月圓時肝非龍肺非虎精華焉得稱丹母五行元只一陰陽四象不離二玄牝採藥川源未易知汞産東方鉛産西離位日魂為垞女坎宫月魄是嬰兒為無為學不學緣覺聲聞都倚閣我今一句全露機身心是火也是藥身心定玄竅通精氣神虛自混融三百日胎神脫蛻翻身拶碎太虛空玄理歌二首至道雖然無處所也憑師匠傳規矩屯蒙取象配朝昏復媚假名稱子午進火無中鍊大丹安爐定裏求真土身心意定共三家鉛汞銀砂同一祖加減依時有後先守城在我分賓主南山赤子跨青龍北海金公騎白虎兩般藥物皆混融一對龜蛇自吞吐直超實際歸大乘頓悟圓通非小補密會真機本自然可憐小法胡撑拄口靈舌辨自誇能氣大心高誰敢覩未會濳心入窈冥何勞立志棲圜堵初機自是不求師老倒無成甘受苦積功纍行滿三千返照回光窮二五起火東方虎嘯風滌塵西極龍行雨驅雷掣電役天罡輔正除邪任玄武姹女才離紫極宫金公已到宋陵府爐中大藥一丸成室內胎仙三疊舞四象五行都合和九還七返功周普皎幨形兆出菴來爍爍光明充大字治人事天莫若嗇夫嗇謂之重積德性天大察長根塵埋路多通增業識心明智慧不如愚雄辨高談爭似默絶慮忘機無是非隱耀含華遠聲色寡欲薄味善根臻省事簡緣德本植一念融通萬虛澄三心剔透諸緣息諦觀三教聖人書息之一宇最簡直若於息上做工夫為佛為仙不勞力息緣達本禪之機息心明理儒之極息氣凝神道之玄三息相須無不克説與知堂田皎蟾究竟自心為軌則性理歌兩儀肇判分三極乾以直專坤闢翕天地中間玄牝門其動愈出靜愈入道統正傳指歸趣仲尼授參參授伋風從虎兮雲從龍火就燥兮水流濕致和格物有等倫入聖超凡無階級君子居易以俟命內省不疚何憂悒致用推明生殺機存身究竟龍蛇蟄回光照破夢中身直下掀翻舊書笈磨光刮垢絶根塵釋纍清心無染習濳心入妙感而通萬里長江一口吸何須乾鼎鍊金精不假坤爐烹玉汁透徹羲皇未畫前世界收來藏黍粒火候歌欲造玄玄須謹獨謹獨工夫機在目絶斷色塵無毁辱清虛方寸瑩如玉極致沖虛守靜篤靜中一動陽來復初九潛龍須攝伏進至見龍休大速才見乾乾光內燭或躍在淵時沐浴九五飛龍成化育陽極陰生須退縮防微杜漸坤初六退至直方金併木六三不可榮以祿括囊以後神丹熟若逢野戰志鈐束陰剝陽純火候足一粒寶珠吞入腹作箇全真仙眷屬一夫一婦常和睦三偶三奇時趁逐素女青郎一處宿黑汞赤鉛自攢簇虛空造就無為屋這箇主人誠不俗山嶽藏雲天地肅爍爍幨光照虛谷龍虎歌並引龍虎者陰陽之異名也陰陽運化神妙莫測故象之以龍虎易繫云一陰一陽之謂道陰陽莫測之謂神丹書云偏陰偏陽之謂疾陰陽者太極之動靜也一分為二清升濁淪大而天地小而物類皆稟陰陽二氣而有形名故覆載之間纎洪巨細未有外乎陰陽者也丹經子書種種異名不出陰陽二字歷代仙師假名立象喻之為龍虎使學徒易取則而成功也龍虎之象千變萬化神妙難窮故喻之為藥物立之為鼎爐運之為火候比之為坎離假之為金木字之為男女配之為夫婦以上異名皆龍虎之妙用也以其靈感故曰藥物以其成物故曰鼎爐以其變化故曰火候以其交濟故曰坎離以其剛直故曰金木以其升沉故曰男女以其妙合故曰夫婦若非龍虎何以盡之文言曰雲從龍風從虎聖人作而萬物覩此發明乾元九五之德也是知龍虎之妙非神德聖功何以當之哉反求諸己情性也化而栽之身心也魂魄也精氣也推而行之玄牝之門也闔闢之機也太上云谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤易云闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通丹書云呼則接天根吸則接地根即乾坤闔闢之機也呼則龍吟雲起吸則虎嘯風生即一闔一闢謂之變也風雲感合化生金液即往來不窮謂之通也金液還返結成大丹故假名曰龍虎大丹也採而餌之長生久視此所謂呼吸者非口鼻也真機妙應一出一入之門户也若向這裏透得龍虎丹成神仙可冀修真至士誠能於龍虎上打得徹透得過真常之道雖曰至玄至微又奚患其不成哉至於種善根植德本養聖胎未有不明龍虎而成者也紫陽云收拾身心謂之降伏龍虎心不動則龍吟身不動則虎嘯龍吟則氣固虎嘯則精凝元精凝則足以保形元氣固則足以凝神形神俱妙與道合真神仙之能事畢矣非天下至神其孰能與於此哉趙束齋者古杭人也幼為內侍職任中官因乾旋坤轉而勘破浮生故棄利捐名而參求道要雖紅塵而混迹實玄境以棲心真脫略世事者也意欲混合凝神故留心於龍虎一日携是圖示豫求其贅語豫辭不可於是乎著筆而塞責焉告之曰古人因道而設象子今因象而立言束齋者貴在明加眼力覷教端的莫教錯認定盤星苟能因言會意觀圖得旨便知道真龍真虎不在紙上而在自己也至於言象兩忘道德備矣咦真龍真虎不難尋只要抽陽去補陰四德運乾誠不息潛飛見躍盡由心雖然也是平地起波濤青天轟霹靂勉旃勉旃歌曰真龍真虎元無象誰為起模傳此樣若於無象裏承當又落斷常終莽蕩青青白白太分明也是無風自起浪時人要識真龍虎不屬有無並子午休將二物混淪吞但把五行顚倒數根芽本是太玄宫造化却在朱陵府雖然運用有主張畢竟虛靈無處所一條大道要心通些子神機非目覩忽然迸開頂𩕄門勘破木金同一母高高絶頂天罡摧耿耿銀河斗柄戽興雲起霧仗丁公掣電驅雷役玄武瞬息之間天地交剎那之頃坎離補虎從水底起清風龍在火中降甘雨雲行雨施天下平運乾龍德功周普人言六龍以缷天孰知一龍是真主人言五虎透玄關孰知一虎生真土會得龍虎常合和便知龜蛇互吞吐聖人設象指蹄筌象外明言便造言言外更須窮祖意元來太極本無得意忘象未為特和意都忘為極則稽首束齋趙隱居徹底掀翻參學畢無一歌道本虛無生太極太極變而先有一一分為二二生三四象五行從此出無一斯為天地根玄教一為衆妙門易自一中分造化人心一上運經綸天得一清地得寧谷得以盈神得靈物得以成人得生侯王得之天下貞禪向一中傳正法儒從一字分開闔老君以一闡真常曾參一唯妙難量道有三乘禪五派畢竟千燈共一光抱元守一通玄竅惟精惟一明聖教太玄真一復命關是知一乃真常道休言得一萬事畢得一持一保勿失一徹萬融天埋明萬法歸一未奇特始者一無生萬有無有相資可長久誠能萬有歸一無方會面南觀北斗至此得一復忘一可與化元同出沒設若執一不能忘大似癡貓守空窟三五混一一返虛反虛之後虛亦無無無既無湛然寂西天鬍子沒髭鬚今人以無唤作無茫蕩頑空涉畏途今人以一唤作一偏枯苦執費工夫不無之無還會得便於守一知無一一無兩字盡掀翻無一先生大事畢抱一歌無極極而為太極太極布妙始於一一分為二生陰陽萬類三才從此出本來真一至虛靈亘古亘今無變易秖因成質神發知善惡機緣有差忒隨情逐幻長荆榛香味色聲都眩惑誠能一上究根原返本還元不費力一夫一婦定中交三女三男無裏得三元八卦會於壬四象五行歸至寂忽然迸破頂𩕄門爍爍金光滿神室虛無之谷自透通玄北之門自闔闢一陽來復妙奚窮四德運乾恆不息浩氣凝神於窈冥出有入無於恍惚中間主宰是甚麼便是達卿元有的慧劍歌自從至人傳劍訣正令全提誠決烈有人問我覓蹤由向道不是尋常鐵此塊鐵出坤方得入吾手便軒昂赫赫火中加火鍊工夫百鍊鍊成鋼學道人知此訣陽神威猛陰魔滅神功妙用實難量我今剖露為君説為君説泄天機下手一陽來復時先令六甲搧爐鞲六丁然後動鉗鎚火功周得成劍初出輝輝如掣電橫揮凛凛清風生卓堅瑩瑩明月現明月現瑞光輝爍地照天神鬼悲激濁揚清蕩妖穢誅龍斬虎滅蛟螭六賊亡三尸絶緣斷慮捐情網裂神鋒指處山嶽崩三界魔王皆勦拆此寶劍本無形為有神功強立名學道修真憑此劍若無此劍道難成開洪濛剖天地消礙化塵無不備有人問我借來看拈出向君會不會挽邪歸正歌道自虛無生一氣誰為安名分五太一氣判而生兩儀清升濁淪成覆載陰陽經緯如擲梭乾坤闔闢如搧鞲兩儀妙合有三才七竅鑿開生萬類無極之真剔渾淪日用平常無不在生生化化百千機不出只今這皮袋誠能自己究根宗四象五行本圓備三反晝夜志不分絶利一源功百倍打透精關與氣關濳通天籟並地籟頭頭合轍有規繩竅竅光明無窒礙若向這裹具眼晴便將兩采做一賽擡頭撞倒須彌峰舉步踏翻玄妙寨單提一理闡真宗會合萬殊歸正派鍊陽神了出陽神自色界超無色界我見今時修行人多是造妖並捏怪氣高強大傲同儕逞俊誇能云自會機鋒捷辨假聰明駕馭談空乾智慧初機學者受欺瞞博學玄流不見愛只管目前逞強梁不顧末後受殃害人前饒舌口喃喃却如擔水河頭賣生煙發火念頭差逐境隨恃心地隘潦潦漉漉弄精神熱熱亂亂苦打睚般精運氣枉辛勤數息按摩徒意快昏沉掉舉難主張不昏即散如之奈神衰氣散怎醫治髓竭形騾空後悔苦求正道出迷津免使填還冤業債收拾從前狂亂心掀翻往日豪強態事父之心推事師得旨先須持禁戒恕己之心推恕人不責於人因善貸不自明而全其明不自大而成其大無事無欲及無知去甚去奢並去泰立基下手要嚴持觸境遇緣更淘汰只憑鉛汞做丹頭莫認塗泥為寶貝更須上下交次離勿謂東西為震兊交梨火棗非腎心木液金精豈肝肺休泥緣覺及聲聞不屬見知並學解究竟無中養就兒禪天淨盡絶纖芥九還七返那機關不在內兮不在外本來實相了無形亘古虛靈終不昧抱元守一藴諸空篤志力行休懈怠合和四象聚三元攢簇五行會八卦烹庚鍊甲有抽添陽火陰符知進退虛無湛寂運機緘恍惚窈冥旋造化兩般靈物入中宫一道金光明四下西南黃氏老婆心鼓合南陵丁女嫁青衣女子才歸房白首金公來入舍夫歡婦合交陰陽雨態雲清忘晝夜氣固精凝結聖胎産顆玄珠太希詫四方剔透太光明八面玲瓏無縫罅都來些子圓團圝黃金萬兩難酬價稽首全真參學人記取清菴説底話誠能直下肯承當便是渠儂把底靶話靶做成又作麼無位真人乘鶴駕中和集卷之四
